<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 강의 수강 현황 (최종 안정화 버전)</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280;
  --bg:#F9FAFB; --card:#fff; --border:#E5E7EB; --text:#111827;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); padding-bottom:80px;}

/* 탭바 */
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:100;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column; gap:2px;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}

.panel{display:none; padding:1rem;}
.panel.active{display:block;}

.header{background:var(--card); padding:1rem; border-bottom:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;}
.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px;}
.stat{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; text-align:center;}
.stat-num{font-size:20px; font-weight:700;}

/* 설정 오버레이 */
.setup-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.setup-panel{background:white; border-radius:20px; padding:25px; width:100%; max-width:400px; box-shadow:0 10px 25px rgba(0,0,0,0.2);}

/* 공통 카드 및 버튼 */
.notice-card{background:white; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px;}
.btn-green{background:var(--green); color:white;}
.btn-blue{background:var(--blue); color:white;}
.btn-gray{background:var(--gray); color:white;}

.form-row{display:flex; gap:8px; margin-bottom:8px;}
input, select, textarea{width:100%; font-family:inherit; font-size:14px; padding:10px; border-radius:10px; border:1px solid var(--border); outline:none; margin-bottom:8px;}

/* 관리자 메뉴 스타일 */
.btn-sub-menu { flex: 1; font-size: 11px; padding: 10px 5px; background: #f3f4f6; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; }
.btn-sub-menu.active { background: var(--blue); color: white; border-color: var(--blue); font-weight: 700; }
.admin-item{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:13px;}
.toast{position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:0.3s; z-index:1000;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="setup-overlay" id="setup-overlay">
  <div class="setup-panel">
    <h2 style="font-size:18px; margin-bottom:15px;">🔧 Firebase 초기 설정</h2>
    <input type="text" id="cfg-url" placeholder="Database URL (https://...)">
    <input type="text" id="cfg-key" placeholder="API Key">
    <input type="text" id="cfg-project" placeholder="Project ID">
    <button onclick="saveConfig()" class="btn btn-green">설정 저장 및 연결</button>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div>
    <span id="conn-status" style="font-size:11px; color:var(--amber); margin-right:8px;">연결 중...</span>
    <button onclick="forceReset()" style="font-size:10px; padding:4px 8px; border:1px solid #ddd; border-radius:5px; background:white;">⚙️ 재설정</button>
  </div>
</div>

<div class="panel active" id="panel-status">
  <div id="setup-area" style="display:flex; gap:8px; margin-bottom:15px;">
    <input type="text" id="my-name-input" placeholder="이름 입력" style="margin-bottom:0;">
    <button onclick="setMyName()" class="btn-blue" style="width:80px; border-radius:10px; border:none; cursor:pointer;">설정</button>
  </div>
  <div id="banner-area" class="banner-box" style="display:none; background:#f0f9ff; padding:12px; border-radius:12px; margin-bottom:15px; justify-content:space-between; align-items:center;">
    <span id="display-name" style="font-weight:700;"></span>
    <button onclick="editName()" style="font-size:11px; background:white; border:1px solid #ddd; padding:2px 8px; border-radius:4px;">수정</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="cnt-active" style="color:var(--green);">0</div><div style="font-size:11px;">수강 중</div></div>
    <div class="stat"><div class="stat-num" id="cnt-waiting" style="color:var(--amber);">0</div><div style="font-size:11px;">대기 중</div></div>
    <div class="stat"><div class="stat-num" id="cnt-total">0</div><div style="font-size:11px;">오늘 총</div></div>
  </div>
  <div class="form-card" style="border:1px solid var(--border); border-radius:15px; padding:15px; background:white;">
    <div class="form-row"><input type="text" id="in-name" placeholder="이름 미설정" readonly style="width:100px; margin-bottom:0;"><select id="in-lecture" style="margin-bottom:0;"></select></div>
    <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()" style="margin-top:10px;">신청하기</button>
  </div>
  <div id="user-list" style="margin-top:20px;"></div>
</div>

<div class="panel" id="panel-lectures">
  <div style="font-size:14px; font-weight
