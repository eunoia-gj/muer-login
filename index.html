#setup-overlay {

.header { background:white; padding:20px; border-bottom:1px solid #ddd; text-align:center; font-weight:700; }
.content { padding:20px; text-align:center; }
.tabbar { position:fixed; bottom:0; left:0; right:0; height:60px; background:white; border-top:1px solid #ddd; display:flex; }
.tab { flex:1; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--gray); cursor:pointer; }
.tab.active { color:var(--blue); font-weight:700; }
</style>
</head>
