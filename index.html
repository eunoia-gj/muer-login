<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 스마트 수강 및 실시간 알림 시스템</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-lLeS49vYY6Al997qS0SOfYVEniS9NMeS57yS4Z7T9Zf7C+5TDPXNlM3u5p9YpG1B" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; --red:#EF4444; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:100;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}
.panel{display:none; padding:1rem;}
.panel.active{display:block;}

.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-amber{background:var(--amber); color:#fff;}

.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;}
.stat{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
.stat-num{font-size:18px; font-weight:700; display:block;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit; font-size:14px;}

/* 알림 강조 스타일 */
@keyframes ring { 0% { transform: scale(1); } 50% { transform: scale(1.05); background:#fffbeb; } 100% { transform: scale(1); } }
.turn-active { animation: ring 1.5s infinite; border: 2px solid var(--amber) !important; }
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 환영합니다!</h2>
    <p style="font-size:13px; color:var(--gray); margin-bottom:20px;">시스템 이용을 위해 이름을 입력하고<br><b>알림 권한</b>을 허용해 주세요.</p>
    <input type="text" id="initial-name-input" placeholder="이름 입력" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">시작하기</button>
  </div>
</div>

<div class="overlay" id="turn-overlay">
  <div class="popup" style="text-align:center;">
    <h2 style="color:var(--blue); margin-bottom:10px;">🔔 지금 수강하세요!</h2>
    <p style="margin-bottom:20px; line-height:1.6; font-size:14px;">대기 순번이 되었습니다.<br><b style="color:red;">5분 내</b>에 아래 버튼을 눌러주세요.</p>
    <div id="timer-display" style="font-size:32px; font-weight:700; margin-bottom:20px; color:var(--amber);">05:00</div>
    <button onclick="claimSeat()" class="btn btn-blue" style="font-size:18px;">수강 시작하기</button>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:11px; padding:6px 12px; border:1px solid #ddd; border-radius:8px; background:#fff;">👤 이용자 변경</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; background:#eff6ff; border:none; margin-bottom:15px;">
        <span id="display-name" style="font-weight:700;">불러오는 중...</span>
        <span id="noti-badge" style="font-size:10px; color:var(--green);">🔔 알림 켜짐</span>
    </div>
    <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-active" style="color:var(--green);">0</span><small>수강 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-waiting" style="color:var(--amber);">0</span><small>대기 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><small>전체</small></div>
    </div>
    <div class="card" style="border:2px solid var(--blue);">
        <div style="display:flex; gap:8px;">
            <input type="text" id="in-name" readonly style="width:90px; background:#f3f4f6;">
            <select id="in-lecture" onchange="updateBtn()"></select>
        </div>
        <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()" style="margin-top:10px;">강의를 선택하세요</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
    <div class="card">
        <input type="text" id="progress-user-input" placeholder="이름 입력" oninput="loadUserProgress()">
        <div id="progress-display" style="background:#f8fafc; padding:15px; border-radius:10px; min-height:100px; font-size:14px; margin-top:10px; border:1px dashed #ddd;"></div>
    </div>
    <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);">
        <p style="font-weight:700; font-size:13px; margin-bottom:10px;">📖 내 진도 업데이트</p>
        <select id="progress-lecture-select" style="margin-bottom:8px;"></select>
        <input type="number" id="progress-chapter-input" placeholder="수강 중인 챕터 수">
        <button onclick="saveMyProgress()" class="btn btn-blue">진도 저장</button>
    </div>
</div>
<div class="panel" id="panel-lectures"><div id="lecture-display-list"></div></div>
<div class="panel" id="panel-notice-acc">
    <div id="notice-list" style="margin-bottom:30px;"></div>
    <div id="account-board-list"></div>
</div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('notice-acc',this)">📋<span>공지/계정</span></div>
</div>
<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
// ⚠️ 여기에 본인의 Firebase 정보를 직접 넣으세요
const firebaseConfig = {
    apiKey: "발급받은_API_KEY",
    databaseURL: "https://muer-love-default-rtdb.firebaseio.com/",
    projectId: "muer-love"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const uRef=db.ref('lecture_users'), lRef=db.ref('lectures'), nRef=db.ref('notices'), aRef=db.ref('accounts'), pRef=db.ref('progress');

let lectures=[], users={}, progressData={}, myName=localStorage.getItem('my_name')||'';
let myTurnTimer = null;

// ── 핵심: 브라우저 알림 기능 ──
function requestNotiPermission() {
    if ("Notification" in window) {
        Notification.requestPermission().then(res => {
            if(res === 'granted') document.getElementById('noti-badge').innerText = "🔔 알림 활성화";
            else document.getElementById('noti-badge').innerText = "🔕 알림 꺼짐";
        });
    }
}

function sendBrowserNoti(title, body) {
    if (Notification.permission === "granted") {
        new Notification(title, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png' });
    }
}

// ── 핵심: 대기열 관리 및 차례 알림 ──
function processQueue() {
  const now = Date.now();
  lectures.forEach(lec => {
    const activeUsers = Object.values(users).filter(u => u.lecture === lec.name && u.status === 'active');
    const waitingUsers = Object.entries(users)
      .filter(([id, u]) => u.lecture === lec.name && u.status === 'waiting')
      .sort((a, b) => a[1].ts - b[1].ts);

    if (activeUsers.length < parseInt(lec.cap) && waitingUsers.length > 0) {
      const [firstId, firstUser] = waitingUsers[0];
      if (!firstUser.notifiedAt) {
        uRef.child(firstId).update({ notifiedAt: now });
        // 이 시점에 브라우저 알림 발생 (본인인 경우)
        if(firstUser.name === myName) {
            sendBrowserNoti("🔔 수강 차례입니다!", `지금 바로 [${lec.name}] 수강을 시작해 주세요!`);
        }
      } else if (now - firstUser.notifiedAt > 300000) {
        uRef.child(firstId).remove(); // 5분 경과 시 자동 취소
      }
    }
  });
}

function checkMyTurn() {
  const myDataArr = Object.entries(users).filter(([id, u]) => u.name === myName && u.notifiedAt && u.status === 'waiting');
  if (myDataArr.length > 0) {
    const [myId, myData] = myDataArr[0];
    document.getElementById('turn-overlay').style.display = 'flex';
    startTimer(myData.notifiedAt);
  } else {
    document.getElementById('turn-overlay').style.display = 'none';
    clearInterval(myTurnTimer);
  }
}

function startTimer(notifiedAt) {
  clearInterval(myTurnTimer);
  myTurnTimer = setInterval(() => {
    const remain = 300 - Math.floor((Date.now() - notifiedAt) / 1000);
    if (remain <= 0) { clearInterval(myTurnTimer); return; }
    const m = String(Math.floor(remain / 60)).padStart(2, '0');
    const s = String(remain % 60).padStart(2, '0');
    document.getElementById('timer-display').textContent = `${m}:${s}`;
  }, 1000);
}

function claimSeat() {
  const myDataArr = Object.entries(users).filter(([id, u]) => u.name === myName && u.notifiedAt);
  if (myDataArr.length > 0) {
    uRef.child(myDataArr[0][0]).update({ status: 'active', notifiedAt: null, ts: Date.now() });
    toast("수강을 시작합니다!");
  }
}

// ── 수강 신청 및 리스트 렌더링 ──
function listen(){
  lRef.on('value', s=>{
    lectures = Object.values(s.val()||[]);
    const options = '<option value="">강의 선택</option>' + lectures.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    document.getElementById('in-lecture').innerHTML = options;
    document.getElementById('progress-lecture-select').innerHTML = options;
    renderLectures(); updateBtn();
  });
  uRef.on('value', s=>{ 
    users = s.val()||{}; 
    processQueue(); // 대기열 처리
    renderUsers(); 
    checkMyTurn(); // 내 차례 확인
    updateBtn(); 
  });
  pRef.on('value', s=>{ progressData = s.val()||{}; loadUserProgress(); });
  nRef.on('value', s=>{ notices = s.val()||{}; renderNotices(); });
  aRef.on('value', s=>{ accounts = s.val()||{}; renderAccBoard(); });
}

function handleReg(){
  if(Object.values(users).some(u=>u.name===myName)) return alert("이미 등록되어 있습니다.");
  const lecName = document.getElementById('in-lecture').value;
  const lec = lectures.find(l=>l.name === lecName);
  const activeCount = Object.values(users).filter(u=>u.lecture===lecName && u.status==='active').length;
  const status = activeCount < (lec?lec.cap:1) ? 'active' : 'waiting';
  uRef.push({name:myName, lecture:lecName, status:status, ts:Date.now()});
  toast(status==='active' ? "수강 시작!" : "대기 등록 완료");
}

function renderUsers(){
  const arr = Object.entries(users).sort((a,b)=>a[1].ts - b[1].ts);
  document.getElementById('stat-active').textContent = arr.filter(u=>u[1].status==='active').length;
  document.getElementById('stat-waiting').textContent = arr.filter(u=>u[1].status==='waiting').length;
  document.getElementById('stat-total').textContent = arr.length;
  
  document.getElementById('user-list').innerHTML = arr.map(([id,u])=>`
    <div class="card ${u.notifiedAt ? 'turn-active' : ''}" style="display:flex; justify-content:space-between; align-items:center; padding:12px;">
      <span><b>${u.name}</b> <small>(${u.lecture})</small></span>
      <div>
        <span style="font-size:11px; color:${u.status==='active'?'var(--green)':'var(--amber)'}; font-weight:700; margin-right:10px;">
          ${u.status==='active'?'● 수강 중':(u.notifiedAt ? '🔔 차례됨' : '⏱ 대기 중')}
        </span>
        <button onclick="uRef.child('${id}').remove()" style="border:none; background:#eee; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">종료</button>
      </div>
    </div>`).join('');
}

// ── 나머지 유틸 ──
function checkInitialName(){ if(!myName)document.getElementById('name-setup-overlay').style.display='flex'; else{document.getElementById('name-setup-overlay').style.display='none'; updateNameUI(); requestNotiPermission(); }}
function saveInitialName(){ const v=document.getElementById('initial-name-input').value.trim(); if(!v)return alert("이름을 입력하세요!"); myName=v; localStorage.setItem('my_name',v); checkInitialName(); }
function updateNameUI(){ document.getElementById('display-name').textContent=`👤 ${myName} 님`; document.getElementById('in-name').value=myName; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }
function forceReset(){ if(confirm("이용자를 변경하시겠습니까?")){ localStorage.removeItem('my_name'); location.reload(); } }
function goTab(id, el){ document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('panel-'+id).classList.add('active'); el.classList.add('active'); }
function updateBtn(){
  const btn=document.getElementById('btn-submit'), lecName=document.getElementById('in-lecture').value;
  if(!myName || !lecName) { btn.disabled=true; btn.className="btn btn-gray"; return; }
  const lec = lectures.find(l=>l.name === lecName);
  const activeCount = Object.values(users).filter(u=>u.lecture===lecName && u.status==='active').length;
  btn.disabled = false;
  if(activeCount < (lec?lec.cap:1)) { btn.textContent = "🟢 즉시 수강하기"; btn.className = "btn btn-green"; } 
  else { btn.textContent = "🟡 대기 등록하기"; btn.className = "btn btn-amber"; }
}
// 진도/공지/관리자 관련 기존 함수들 유지... (생략하지 않고 코드에 포함되어야 함)
function loadUserProgress() { const target = document.getElementById('progress-user-input').value.trim(); const display = document.getElementById('progress-display'); const mySect = document.getElementById('my-progress-section'); if(!target) { display.innerHTML="이름을 입력하세요."; mySect.style.display='none'; return; } const userData = progressData[target]; if(userData) { let html = ""; Object.entries(userData).forEach(([lecName, data]) => { const delBtn = (target === myName) ? `<button style="background:#eee;border:none;padding:2px 6px;border-radius:4px;font-size:11px;" onclick="pRef.child('${myName}').child('${lecName}').remove()">삭제</button>` : ""; html += `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:10px 0;"><div><b>[${lecName}]</b> ${data.chapter}챕터</div>${delBtn}</div>`; }); display.innerHTML = html; } else { display.innerHTML = "진도 없음"; } if(target === myName) mySect.style.display='block'; else mySect.style.display='none'; }
function saveMyProgress() { const c = document.getElementById('progress-chapter-input').value; const l = document.getElementById('progress-lecture-select').value; if(l&&c) pRef.child(myName).child(l).set({chapter:c, ts:Date.now()}).then(()=>toast("저장됨")); }
function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; renderAdminNtc(); renderAdminLec(); renderAdminAcc(); }
function closeAdmin() { document.getElementById('admin-overlay').style.display='none'; }
function showSub(id, btn){ document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none'); document.querySelectorAll('.btn-sub').forEach(b=>{ b.style.background='#f3f4f6'; b.style.color='#111'; }); document.getElementById('sub-'+id).style.display='block'; btn.style.background='var(--blue)'; btn.style.color='#fff'; }
function renderAdminNtc(){ document.getElementById('ntc-mng-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div>${n.title} <span onclick="nRef.child('${id}').remove()">[삭제]</span></div>`).join(''); }
function addNotice(){ const t=document.getElementById('ntc-title').value; const b=document.getElementById('ntc-body').value; if(t) nRef.push({title:t, body:b, ts:Date.now()}); }
function renderAdminLec(){ document.getElementById('lec-mng-list').innerHTML=lectures.map((l,i)=>`<div>${l.name} <span onclick="const c=[...lectures];c.splice(${i},1);lRef.set(c);">[삭제]</span></div>`).join(''); }
function addLecture(){ const n=document.getElementById('lec-name').value; const c=document.getElementById('lec-cap').value; if(n) lRef.push({name:n, cap:c}); }
function renderAdminAcc(){ document.getElementById('acc-mng-list').innerHTML=Object.entries(accounts).map(([id,a])=>`<div>${a.label} <span onclick="aRef.child('${id}').remove()">[삭제]</span></div>`).join(''); }
function addAccount(){ const l=document.getElementById('acc-label').value; const o=document.getElementById('acc-owner').value; const i=document.getElementById('acc-id').value; const p=document.getElementById('acc-pw').value; if(l) aRef.push({label:l, owner:o, id:i, pw:p, ts:Date.now()}); }
function renderLectures(){ document.getElementById('lecture-display-list').innerHTML=lectures.map(l=>{ let accHtml=""; if(l.accId&&accounts[l.accId]){const a=accounts[l.accId]; accHtml=`<div class="acc-info-box"><b>🔑 계정: ${a.label}</b><br>ID: ${a.id} / PW: ${a.pw}</div>`;} return `<div class="card"><b>${l.name}</b> (정원 ${l.cap})${accHtml}</div>`; }).join(''); }
function renderNotices(){ document.getElementById('notice-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div class="card" onclick="alert('${n.body.replace(/\n/g, '\\n')}')"><b>${n.title}</b><br><small>${n.body.substring(0,20)}...</small></div>`).join(''); }
function renderAccBoard(){ document.getElementById('account-board-list').innerHTML=Object.values(accounts).map(a=>`<div class="card"><b>${a.label}</b> (주인: ${a.owner})<br>ID: ${a.id} / PW: ${a.pw}</div>`).join(''); }

listen();
checkInitialName();
</script>
</body>
</html>
