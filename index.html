<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Muer 수강 시스템</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; --red:#EF4444; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:200;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}

.panel{display:none; padding:1rem;}
.panel.active{display:block !important;}

.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s; font-size:14px;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-amber{background:var(--amber); color:#fff;}
.btn-gray{background:var(--gray); color:#fff;}

.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;}
.stat{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
.stat-num{font-size:18px; font-weight:700; display:block;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit;}
.acc-info-box { background:#f0f7ff; border-radius:8px; padding:10px; margin-top:10px; font-size:13px; border:1px solid #dbeafe; line-height:1.6; }

/* 알림 설정 배너 */
.noti-fix-bar { background:#312e81; color:white; padding:10px; text-align:center; font-size:12px; cursor:pointer; }
</style>
</head>
<body>

<div id="noti-fix-bar" class="noti-fix-bar" onclick="requestNotification()">
    ⚠️ 알림이 안 오나요? 여기를 클릭해서 권한을 다시 허용해 보세요!
</div>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <input type="text" id="initial-name-input" placeholder="이름을 입력해 주세요" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">시작하기</button>
  </div>
</div>

<div class="overlay" id="turn-popup-overlay">
  <div class="popup" style="text-align:center; border:4px solid var(--amber);">
    <h2 style="color:var(--amber); margin-bottom:10px;">🔔 지금 수강하세요!</h2>
    <p id="turn-popup-msg" style="margin-bottom:20px; line-height:1.6; font-weight:500;"></p>
    <button onclick="document.getElementById('turn-popup-overlay').style.display='none'" class="btn btn-amber">확인했습니다</button>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:11px; padding:6px 12px; border:1px solid #ddd; border-radius:8px; background:#fff;">👤 이용자 변경</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" style="background:#eff6ff; border:none; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
        <span id="display-name" style="font-weight:700;">👤 불러오는 중...</span>
        <button onclick="testNoti()" style="font-size:10px; background:#fff; border:1px solid #ddd; padding:4px 8px; border-radius:6px; cursor:pointer;">🔔 알림/소리 테스트</button>
    </div>
    
    <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-active" style="color:var(--green);">0</span><small>수강 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-waiting" style="color:var(--amber);">0</span><small>대기 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><small>전체</small></div>
    </div>
    
    <div class="card" style="border:2px solid var(--blue);">
        <div style="display:flex; gap:8px;">
            <input type="text" id="in-name" readonly style="width:90px; background:#f3f4f6;">
            <select id="in-lecture" onchange="updateBtn()"></select>
        </div>
        <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()">강의를 선택하세요</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
    <div class="card"><input type="text" id="progress-user-input" placeholder="조회할 이름 입력" oninput="loadUserProgress()"><div id="progress-display" style="background:#f8fafc; padding:15px; border-radius:10px; min-height:100px; font-size:14px; margin-top:10px; border:1px dashed #ddd;"></div></div>
    <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);"><p style="font-weight:700; font-size:13px; margin-bottom:10px;">📖 내 진도 업데이트</p><select id="progress-lecture-select" style="margin-bottom:8px;"></select><div style="display:flex; gap:8px; align-items:center;"><input type="number" id="progress-chapter-input" placeholder="수강 챕터" style="flex:1; margin-bottom:0;"><b>챕터</b></div><button onclick="saveMyProgress()" class="btn btn-blue" style="margin-top:10px;">저장하기</button></div>
</div>
<div class="panel" id="panel-lectures"><div id="lecture-display-list"></div></div>
<div class="panel" id="panel-notice-acc"><div id="notice-list" style="margin-bottom:30px;"></div><div id="account-board-list"></div></div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('notice-acc',this)">📋<span>공지/계정</span></div>
</div>

<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
/** 탭 기능 **/
function goTab(id, el){
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    if(el) el.classList.add('active');
}

/** Firebase 설정 (API KEY 포함) **/
const firebaseConfig = {
    apiKey: "AIzaSyBy4_hmtnhYbbC7icOtajmpGvix4LO3Xhk",
    databaseURL: "https://muer-love-default-rtdb.firebaseio.com/",
    projectId: "muer-love"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const uRef=db.ref('lecture_users'), lRef=db.ref('lectures'), nRef=db.ref('notices'), aRef=db.ref('accounts'), pRef=db.ref('progress');

let lectures=[], users={}, progressData={}, notices={}, accounts={}, myName=localStorage.getItem('my_name')||'', lastStatus=null;

// [추가] 알림 사운드 객체 생성
const notiSound = new Audio('https://t1.daumcdn.net/kakaotalk/public/sound/talk.mp3');

/** 알림 권한 요청 **/
function requestNotification() {
    if (!("Notification" in window)) return alert("알림을 지원하지 않는 브라우저입니다.");
    Notification.requestPermission().then(permission => {
        if (permission === "granted") {
            document.getElementById('noti-fix-bar').style.display = 'none';
            new Notification("알림 설정 성공!", { body: "이제 수강 차례가 되면 소리와 함께 알림이 울립니다." });
        } else {
            alert("알림 권한이 차단되어 있습니다. 주소창의 자물쇠 아이콘을 눌러 허용으로 바꿔주세요.");
        }
    });
}

/** [강화] 시스템 알림 + 사운드 전송 **/
function sendAlert(title, body) {
    // 1. 소리 알림 (다른 탭에 있어도 들림)
    notiSound.play().catch(e => console.log("소리 재생 실패 (사용자 상호작용 필요)"));

    // 2. 브라우저 외부 시스템 알림
    if (Notification.permission === "granted") {
        const n = new Notification(title, { 
            body: body,
            icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png',
            requireInteraction: true // 사용자가 닫을 때까지 알림 유지
        });
        n.onclick = () => { window.focus(); n.close(); };
    }
    
    // 3. 사이트 내 팝업
    document.getElementById('turn-popup-msg').innerText = body;
    document.getElementById('turn-popup-overlay').style.display = 'flex';
}

function testNoti() {
    toast("5초 후 소리와 함께 알림이 옵니다. 다른 탭을 열어보세요!");
    setTimeout(() => {
        sendAlert("🔔 알림 테스트 완료", "정상적으로 알림과 소리가 작동합니다!");
    }, 5000);
}

/** 실시간 데이터 감시 **/
function listen(){
  lRef.on('value', s=>{
    lectures = Object.values(s.val()||[]);
    const options = '<option value="">강의 선택</option>' + lectures.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    document.getElementById('in-lecture').innerHTML = options;
    document.getElementById('progress-lecture-select').innerHTML = options;
    renderLectures(); updateBtn();
  });
  
  uRef.on('value', s=>{
    const newUsers = s.val()||{};
    const myInfo = Object.values(newUsers).find(u => u.name === myName);
    if (myInfo && lastStatus === 'waiting' && myInfo.status === 'active') {
        sendAlert("🎓 지금 수강하세요!", `대기 순번이 되어 [${myInfo.lecture}] 수강이 시작되었습니다!`);
    }
    lastStatus = myInfo ? myInfo.status : null;
    users = newUsers; renderUsers(); updateBtn(); checkAndPromote();
  });

  nRef.on('value', s=>{ notices = s.val()||{}; renderNotices(); });
  aRef.on('value', s=>{ accounts = s.val()||{}; renderAccBoard(); renderLectures(); });
  pRef.on('value', s=>{ progressData = s.val()||{}; loadUserProgress(); });
}

function checkAndPromote() {
    lectures.forEach(lec => {
        const activeCount = Object.values(users).filter(u => u.lecture === lec.name && u.status === 'active').length;
        if (activeCount < (parseInt(lec.cap) || 1)) {
            const next = Object.entries(users).filter(([id, u]) => u.lecture === lec.name && u.status === 'waiting').sort((a, b) => a[1].ts - b[1].ts)[0];
            if (next) uRef.child(next[0]).update({ status: 'active', ts: Date.now() });
        }
    });
}

/** 렌더링 및 기능 **/
function renderUsers(){
    const arr = Object.entries(users).sort((a,b)=>a[1].ts - b[1].ts);
    document.getElementById('stat-active').textContent = arr.filter(u=>u[1].status==='active').length;
    document.getElementById('stat-waiting').textContent = arr.filter(u=>u[1].status==='waiting').length;
    document.getElementById('stat-total').textContent = arr.length;
    document.getElementById('user-list').innerHTML = arr.map(([id,u])=>`
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px;">
            <span><b>${u.name}</b> <small>(${u.lecture})</small></span>
            <div style="display:flex; align-items:center;">
                <span style="font-size:11px; color:${u.status==='active'?'var(--green)':'var(--amber)'}; font-weight:700; margin-right:10px;">${u.status==='active'?'● 수강 중':'⏱ 대기 중'}</span>
                ${(u.name === myName) ? `<button onclick="uRef.child('${id}').remove()" style="border:none; background:var(--red); color:#fff; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">종료</button>` : ""}
            </div>
        </div>`).join('');
}

function renderLectures(){
    document.getElementById('lecture-display-list').innerHTML = lectures.map(l=>{
        let accHtml = "";
        if(l.accId && accounts[l.accId]) {
            const a = accounts[l.accId];
            accHtml = `<div class="acc-info-box"><b>🔑 연결 계정: ${a.label}</b><br>ID: ${a.id} / PW: ${a.pw}<br><small>주인: ${a.owner||'미지정'}</small></div>`;
        }
        return `<div class="card"><b>${l.name}</b> (정원 ${l.cap})${accHtml}</div>`;
    }).join('') || '<div class="card">등록된 강의 없음</div>';
}

function loadUserProgress() {
    const target = document.getElementById('progress-user-input').value.trim();
    const display = document.getElementById('progress-display');
    const mySect = document.getElementById('my-progress-section');
    if(!target) { display.innerHTML="이름을 입력하세요."; mySect.style.display='none'; return; }
    const userData = progressData[target];
    if(userData) {
        display.innerHTML = Object.entries(userData).map(([lec, d]) => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><b>[${lec}]</b> ${d.chapter}챕터 ${(target===myName)?`<button style="font-size:10px; border:none; padding:2px 5px;" onclick="pRef.child('${myName}').child('${lec}').remove()">삭제</button>`:''}</div>`).join('');
    } else display.innerHTML = "기록 없음";
    mySect.style.display = (target === myName) ? 'block' : 'none';
}

/** 기초 초기화 로직 **/
function checkInitialName(){
    if(!myName) document.getElementById('name-setup-overlay').style.display='flex';
    else {
        document.getElementById('display-name').textContent = `👤 ${myName} 님`;
        document.getElementById('in-name').value = myName;
        document.getElementById('progress-user-input').value = myName;
        if(Notification.permission !== "granted") document.getElementById('noti-fix-bar').style.display = 'block';
        listen();
    }
}
function saveInitialName(){
    const v = document.getElementById('initial-name-input').value.trim();
    if(!v) return alert("이름을 입력하세요!");
    myName = v; localStorage.setItem('my_name', v);
    location.reload();
}
function forceReset(){ if(confirm("이용자를 변경하시겠습니까?")){ localStorage.removeItem('my_name'); location.reload(); } }
async function handleReg(){
    if(Object.values(users).some(u=>u.name===myName)) return alert("이미 등록되어 있습니다.");
    const ln=document.getElementById('in-lecture').value, lc=lectures.find(l=>l.name===ln);
    const ac=Object.values(users).filter(u=>u.lecture===ln&&u.status==='active').length;
    const status = ac<(lc?lc.cap:1) ? 'active' : 'waiting';

    if (status === 'waiting' && Notification.permission !== 'granted') {
        alert("대기 순번 알림을 받으려면 알림 허용이 필요합니다.");
        await Notification.requestPermission();
    }
    uRef.push({name:myName, lecture:ln, status:status, ts:Date.now()});
    toast("등록 완료!");
}

/** 관리자 도구 **/
function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; renderAdminNtc(); renderAdminLec(); renderAdminAcc(); }
function closeAdmin() { document.getElementById('admin-overlay').style.display='none'; }
function showSub(id, btn){ document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none'); document.querySelectorAll('.btn-sub').forEach(b=>b.style.background='#f3f4f6'); document.getElementById('sub-'+id).style.display='block'; btn.style.background='var(--blue)'; btn.style.color='#fff'; }
function addNotice(){ const t=document.getElementById('ntc-title').value; if(t) nRef.push({title:t, body:document.getElementById('ntc-body').value, ts:Date.now()}); }
function addLecture(){ const n=document.getElementById('lec-name').value; if(n) lRef.push({name:n, cap:document.getElementById('lec-cap').value, accId:document.getElementById('lec-acc-select').value}); }
function addAccount(){ const l=document.getElementById('acc-label').value; if(l) aRef.push({label:l, owner:document.getElementById('acc-owner').value, id:document.getElementById('acc-id').value, pw:document.getElementById('acc-pw').value}); }
function renderAdminNtc(){ document.getElementById('ntc-mng-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div>${n.title} <button onclick="nRef.child('${id}').remove()">X</button></div>`).join(''); }
function renderAdminLec(){ document.getElementById('lec-mng-list').innerHTML=lectures.map((l,i)=>`<div>${l.name} <button onclick="const c=[...lectures]; c.splice(${i},1); lRef.set(c);">X</button></div>`).join(''); }
function renderAdminAcc(){ document.getElementById('acc-mng-list').innerHTML=Object.entries(accounts).map(([id,a])=>`<div>${a.label} <button onclick="aRef.child('${id}').remove()">X</button></div>`).join(''); }
function renderNotices(){ document.getElementById('notice-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div class="card" onclick="alert('${n.body.replace(/\n/g, '\\n')}')"><b>${n.title}</b></div>`).join(''); }
function renderAccBoard(){ document.getElementById('account-board-list').innerHTML=Object.values(accounts).map(a=>`<div class="card" style="border-left:4px solid var(--blue); background:#f9fafb;"><b>${a.label}</b> (주인:${a.owner})<br>ID: ${a.id} / PW: ${a.pw}</div>`).join(''); }
function updateBtn(){ const btn=document.getElementById('btn-submit'), ln=document.getElementById('in-lecture').value; if(!myName||!ln){btn.disabled=true; return;} const lc=lectures.find(l=>l.name===ln), ac=Object.values(users).filter(u=>u.lecture===ln&&u.status==='active').length; btn.disabled=false; btn.className=ac<(lc?lc.cap:1)?"btn btn-green":"btn btn-amber"; btn.textContent=ac<(lc?lc.cap:1)?"🟢 즉시 수강하기":"🟡 대기 등록하기"; }
function saveMyProgress() { const c=document.getElementById('progress-chapter-input').value, l=document.getElementById('progress-lecture-select').value; if(l&&c) pRef.child(myName).child(l).set({chapter:c, ts:Date.now()}).then(()=>toast("저장됨")); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }

checkInitialName();
</script>
</body>
</html>
