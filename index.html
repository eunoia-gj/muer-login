<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 스마트 수강 및 진도 관리 시스템</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; --red:#EF4444; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

/* 헤더 고정 */
.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}

/* 탭바 고정 */
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:200;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column; transition: 0.2s;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}

/* 패널 제어 */
.panel{display:none; padding:1rem;}
.panel.active{display:block !important;}

/* 오버레이 */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

/* 카드 및 버튼 */
.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s; font-size:14px;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-gray{background:var(--gray); color:#fff;}

.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;}
.stat{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
.stat-num{font-size:18px; font-weight:700; display:block;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit;}
.progress-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 12px 0; }
.acc-info-box { background:#f0f7ff; border-radius:8px; padding:10px; margin-top:10px; font-size:13px; border:1px solid #dbeafe; }
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <input type="text" id="initial-name-input" placeholder="이름을 입력해 주세요" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">시작하기</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="popup">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <h2 style="font-size:18px; margin-bottom:15px;">⚙️ 관리 시스템</h2>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="showSub('ntc',this)" class="btn-sub active" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:var(--blue); color:white;">공지</button>
        <button onclick="showSub('lec',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">강의</button>
        <button onclick="showSub('acc',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">계정</button>
    </div>
    <div id="sub-ntc" class="tool-box"><input type="text" id="ntc-title" placeholder="제목"><textarea id="ntc-body" rows="3" placeholder="내용"></textarea><button onclick="addNotice()" class="btn btn-blue">저장</button><div id="ntc-mng-list" style="margin-top:10px;"></div></div>
    <div id="sub-lec" class="tool-box" style="display:none;"><input type="text" id="lec-name" placeholder="강의명"><input type="number" id="lec-cap" placeholder="정원"><select id="lec-acc-select"></select><button onclick="addLecture()" class="btn btn-green">저장</button><div id="lec-mng-list" style="margin-top:10px;"></div></div>
    <div id="sub-acc" class="tool-box" style="display:none;"><input type="text" id="acc-label" placeholder="사이트명"><input type="text" id="acc-owner" placeholder="주인"><input type="text" id="acc-id" placeholder="ID"><input type="text" id="acc-pw" placeholder="PW"><button onclick="addAccount()" class="btn btn-gray" style="opacity:1;">저장</button><div id="acc-mng-list" style="margin-top:10px;"></div></div>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:11px; padding:6px 12px; border:1px solid #ddd; border-radius:8px; background:#fff;">👤 이용자 변경</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; background:#eff6ff; border:none; margin-bottom:15px;">
        <span id="display-name" style="font-weight:700;">불러오는 중...</span>
    </div>
    <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-active" style="color:var(--green);">0</span><small>수강 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-waiting" style="color:var(--amber);">0</span><small>대기 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><small>전체</small></div>
    </div>
    <div class="card" style="border:2px solid var(--blue);">
        <div style="display:flex; gap:8px;">
            <input type="text" id="in-name" readonly style="width:90px; background:#f3f4f6;">
            <select id="in-lecture" onchange="updateBtn()"></select>
        </div>
        <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()">강의를 선택하세요</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
    <div class="card">
        <input type="text" id="progress-user-input" placeholder="이름 입력" oninput="loadUserProgress()">
        <div id="progress-display" style="background:#f8fafc; padding:15px; border-radius:10px; min-height:100px; font-size:14px; margin-top:10px; border:1px dashed #ddd;">이름을 입력하세요.</div>
    </div>
    <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);">
        <p style="font-weight:700; font-size:13px; margin-bottom:10px;">📖 내 진도 업데이트</p>
        <select id="progress-lecture-select" style="margin-bottom:8px;"></select>
        <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
            <input type="number" id="progress-chapter-input" placeholder="수강 중인 챕터 수" style="flex:1; margin-bottom:0;">
            <span style="font-weight:700;">챕터</span>
        </div>
        <button onclick="saveMyProgress()" class="btn btn-blue">저장/덮어쓰기</button>
    </div>
</div>

<div class="panel" id="panel-lectures">
    <div style="font-weight:700; margin-bottom:10px;">🎓 전체 강의 목록</div>
    <div id="lecture-display-list"></div>
</div>

<div class="panel" id="panel-notice-acc">
    <div style="font-weight:700; margin-bottom:10px;">📋 공지사항</div>
    <div id="notice-list" style="margin-bottom:30px;"></div>
    <div style="font-weight:700; margin-bottom:10px; padding-top:20px; border-top:2px solid #eee;">🔑 공유 계정 정보</div>
    <div id="account-board-list"></div>
</div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('notice-acc',this)">📋<span>공지/계정</span></div>
</div>

<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
/**
 * [핵심] 탭 전환 함수 - 스크립트 최상단에 배치
 */
function goTab(id, el){
  // 모든 패널 숨기기
  const panels = document.querySelectorAll('.panel');
  panels.forEach(p => p.classList.remove('active'));
  
  // 모든 탭 비활성화
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));
  
  // 선택한 패널 보이기
  const targetPanel = document.getElementById('panel-' + id);
  if(targetPanel) targetPanel.classList.add('active');
  
  // 클릭한 탭 활성화
  if(el) el.classList.add('active');
}

// ⚠️ Firebase 설정
const firebaseConfig = {
    apiKey: "AIzaSyBy4_hmtnhYbbC7icOtajmpGvix4LO3Xhk",
    databaseURL: "https://muer-love-default-rtdb.firebaseio.com/",
    projectId: "muer-love"
};

// 초기화
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const uRef=db.ref('lecture_users'), lRef=db.ref('lectures'), nRef=db.ref('notices'), aRef=db.ref('accounts'), pRef=db.ref('progress');

let lectures=[], users={}, progressData={}, notices={}, accounts={}, myName=localStorage.getItem('my_name')||'';
let editTgt = { type: null, id: null };

function listen(){
  lRef.on('value', s=>{
    lectures = Object.values(s.val()||[]);
    const options = '<option value="">강의 선택</option>' + lectures.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    document.getElementById('in-lecture').innerHTML = options;
    document.getElementById('progress-lecture-select').innerHTML = options;
    renderLectures(); renderAdminLec(); updateBtn();
  });
  uRef.on('value', s=>{ users = s.val()||{}; renderUsers(); updateBtn(); });
  nRef.on('value', s=>{ notices = s.val()||{}; renderNotices(); renderAdminNtc(); });
  aRef.on('value', s=>{ 
    accounts = s.val()||{}; renderAccBoard(); renderAdminAcc();
    document.getElementById('lec-acc-select').innerHTML = '<option value="">계정 선택</option>' + Object.entries(accounts).map(([id, a])=>`<option value="${id}">${a.label}</option>`).join('');
  });
  pRef.on('value', s=>{ progressData = s.val()||{}; loadUserProgress(); });
}

// ── 데이터 렌더링 ──
function renderUsers(){
  const arr = Object.entries(users).sort((a,b)=>a[1].ts - b[1].ts);
  document.getElementById('stat-active').textContent = arr.filter(u=>u[1].status==='active').length;
  document.getElementById('stat-waiting').textContent = arr.filter(u=>u[1].status==='waiting').length;
  document.getElementById('stat-total').textContent = arr.length;
  document.getElementById('user-list').innerHTML = arr.map(([id,u])=>`
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px;">
      <span><b>${u.name}</b> <small>(${u.lecture})</small></span>
      <div><span style="font-size:11px; color:${u.status==='active'?'var(--green)':'var(--amber)'}; font-weight:700; margin-right:10px;">${u.status==='active'?'● 수강 중':'⏱ 대기 중'}</span>
      <button onclick="uRef.child('${id}').remove()" style="border:none; background:#eee; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">종료</button></div>
    </div>`).join('');
}

function renderLectures(){
  document.getElementById('lecture-display-list').innerHTML = lectures.map(l=>{
    let accHtml = "";
    if(l.accId && accounts[l.accId]) {
        const a = accounts[l.accId];
        accHtml = `<div class="acc-info-box"><b>🔑 연결 계정: ${a.label}</b><br>ID: ${a.id} / PW: ${a.pw}<br><small>주인: ${a.owner||'미지정'}</small></div>`;
    }
    return `<div class="card"><b>${l.name}</b> (정원 ${l.cap})${accHtml}</div>`;
  }).join('');
}

function loadUserProgress() {
  const target = document.getElementById('progress-user-input').value.trim();
  const display = document.getElementById('progress-display');
  const mySect = document.getElementById('my-progress-section');
  if(!target) { display.innerHTML="이름을 입력하세요."; mySect.style.display='none'; return; }
  
  const userData = progressData[target];
  if(userData) {
    let html = "";
    Object.entries(userData).forEach(([lec, data]) => {
      const delBtn = (target === myName) ? `<button class="delete-small" onclick="deleteProgress('${lec}')">삭제</button>` : "";
      html += `<div class="progress-item"><div><b>[${lec}]</b><br><span style="font-size:15px;">현재 <b>${data.chapter || 0}</b> 챕터</span></div>${delBtn}</div>`;
    });
    display.innerHTML = html;
  } else { display.innerHTML = "기록된 진도가 없습니다."; }
  mySect.style.display = (target === myName) ? 'block' : 'none';
}

function saveMyProgress() {
  const c = document.getElementById('progress-chapter-input').value, l = document.getElementById('progress-lecture-select').value;
  if(l && c) pRef.child(myName).child(l).set({chapter:c, ts:Date.now()}).then(()=>toast("저장되었습니다."));
}

function deleteProgress(lec) {
  if(confirm(`[${lec}] 진도를 삭제하시겠습니까?`)) pRef.child(myName).child(lec).remove();
}

// ── 관리자 및 기타 기능 ──
function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; renderAdminNtc(); renderAdminLec(); renderAdminAcc(); }
function closeAdmin() { document.getElementById('admin-overlay').style.display='none'; }
function showSub(id, btn){ document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none'); document.querySelectorAll('.btn-sub').forEach(b=>{ b.style.background='#f3f4f6'; b.style.color='#111'; }); document.getElementById('sub-'+id).style.display='block'; btn.style.background='var(--blue)'; btn.style.color='#fff'; }
function addNotice(){ const t=document.getElementById('ntc-title').value, b=document.getElementById('ntc-body').value; if(t) nRef.push({title:t, body:b, ts:Date.now()}).then(()=>resetForm()); }
function addLecture(){ const n=document.getElementById('lec-name').value, c=document.getElementById('lec-cap').value, a=document.getElementById('lec-acc-select').value; if(n) lRef.push({name:n, cap:c, accId:a}).then(()=>resetForm()); }
function addAccount(){ const l=document.getElementById('acc-label').value, o=document.getElementById('acc-owner').value, i=document.getElementById('acc-id').value, p=document.getElementById('acc-pw').value; if(l) aRef.push({label:l, owner:o, id:i, pw:p, ts:Date.now()}).then(()=>resetForm()); }
function renderAdminNtc(){ document.getElementById('ntc-mng-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div class="admin-item-row">${n.title} <span onclick="nRef.child('${id}').remove()" style="color:red;cursor:pointer;">[삭제]</span></div>`).join(''); }
function renderAdminLec(){ document.getElementById('lec-mng-list').innerHTML=lectures.map((l,i)=>`<div class="admin-item-row">${l.name} <span onclick="const c=[...lectures];c.splice(${i},1);lRef.set(c);" style="color:red;cursor:pointer;">[삭제]</span></div>`).join(''); }
function renderAdminAcc(){ document.getElementById('acc-mng-list').innerHTML=Object.entries(accounts).map(([id,a])=>`<div class="admin-item-row">${a.label} <span onclick="aRef.child('${id}').remove()" style="color:red;cursor:pointer;">[삭제]</span></div>`).join(''); }
function renderNotices(){ document.getElementById('notice-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div class="card" onclick="alert('${n.body.replace(/\n/g, '\\n')}')"><b>${n.title}</b></div>`).join(''); }
function renderAccBoard(){ document.getElementById('account-board-list').innerHTML=Object.values(accounts).map(a=>`<div class="card" style="border-left:4px solid var(--blue); background:#f9fafb;"><b>${a.label}</b> (주인: ${a.owner})<br>ID: ${a.id} / PW: ${a.pw}</div>`).join(''); }
function resetForm(){ ['ntc-title','ntc-body','lec-name','lec-cap','acc-label','acc-owner','acc-id','acc-pw'].forEach(i=>document.getElementById(i).value=''); }

// ── 사용자 환경설정 ──
function checkInitialName(){ if(!myName)document.getElementById('name-setup-overlay').style.display='flex'; else{document.getElementById('name-setup-overlay').style.display='none'; updateNameUI(); document.getElementById('progress-user-input').value=myName; loadUserProgress();}}
function saveInitialName(){ const v=document.getElementById('initial-name-input').value.trim(); if(!v)return alert("이름을 입력하세요!"); myName=v; localStorage.setItem('my_name',v); checkInitialName(); }
function updateNameUI(){ document.getElementById('display-name').textContent=`👤 ${myName} 님`; document.getElementById('in-name').value=myName; }
function updateBtn(){ const btn=document.getElementById('btn-submit'), ln=document.getElementById('in-lecture').value; if(!myName||!ln){btn.disabled=true; return;} const lc=lectures.find(l=>l.name===ln); const ac=Object.values(users).filter(u=>u.lecture===ln&&u.status==='active').length; btn.disabled=false; btn.className=ac<(lc?lc.cap:1)?"btn btn-green":"btn btn-amber"; btn.textContent=ac<(lc?lc.cap:1)?"🟢 즉시 수강하기":"🟡 대기 등록하기"; }
function handleReg(){ const ln=document.getElementById('in-lecture').value; const lc=lectures.find(l=>l.name===ln); const ac=Object.values(users).filter(u=>u.lecture===ln&&u.status==='active').length; uRef.push({name:myName, lecture:ln, status:ac<(lc?lc.cap:1)?'active':'waiting', ts:Date.now()}); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }
function forceReset(){ if(confirm("이용자를 변경하시겠습니까?")){ localStorage.removeItem('my_name'); location.reload(); } }

listen();
checkInitialName();
</script>
</body>
</html>
