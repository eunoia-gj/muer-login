<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔑 Muer 로그인 현황 & 알림</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; --red:#EF4444; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

/* 헤더 및 탭바 */
.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:200;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}

.panel{display:none; padding:1rem;}
.panel.active{display:block !important;}

/* 팝업 */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3); max-height:85vh; overflow-y:auto;}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s; font-size:14px;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-amber{background:var(--amber); color:#fff;}
.btn-gray{background:var(--gray); color:#fff;}

.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;}
.stat{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
.stat-num{font-size:18px; font-weight:700; display:block;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit;}
.acc-info-box { background:#f0f7ff; border-radius:8px; padding:10px; margin-top:10px; font-size:13px; border:1px solid #dbeafe; line-height:1.6; }
.admin-item-row{display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #eee; font-size:13px;}
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <input type="text" id="initial-name-input" placeholder="이용자 이름을 입력해 주세요" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">시작하기</button>
  </div>
</div>

<div class="overlay" id="turn-popup-overlay">
  <div class="popup" style="text-align:center; border:4px solid var(--amber);">
    <h2 style="color:var(--amber); margin-bottom:10px;">🔔 로그인 하세요!</h2>
    <p id="turn-popup-msg" style="margin-bottom:20px; line-height:1.6; font-weight:500;"></p>
    <button onclick="document.getElementById('turn-popup-overlay').style.display='none'" class="btn btn-amber">확인했습니다</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="popup">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <h2 style="font-size:18px; margin-bottom:15px;">⚙️ 계정 관리 시스템</h2>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="showSub('ntc',this)" class="btn-sub active" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:var(--blue); color:white;">공지</button>
        <button onclick="showSub('acc',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">계정 설정</button>
    </div>
    <div id="sub-ntc" class="tool-box"><input type="text" id="ntc-title" placeholder="제목"><textarea id="ntc-body" rows="3" placeholder="내용"></textarea><button id="btn-ntc-save" onclick="addNotice()" class="btn btn-blue">저장</button><div id="ntc-mng-list" style="margin-top:15px;"></div></div>
    <div id="sub-acc" class="tool-box" style="display:none;">
        <input type="text" id="acc-label" placeholder="사이트명"><input type="text" id="acc-owner" placeholder="계정 주인"><input type="text" id="acc-id" placeholder="ID"><input type="text" id="acc-pw" placeholder="PW"><input type="number" id="acc-cap" placeholder="정원" value="1">
        <button id="btn-acc-save" onclick="addAccount()" class="btn btn-gray">계정 저장</button>
        <div id="acc-mng-list" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<div class="header">
  <b>📚 로그인 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:11px; padding:6px 12px; border:1px solid #ddd; border-radius:8px; background:#fff;">👤 이용자 변경</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" id="display-name" style="background:#eff6ff; border:none; margin-bottom:15px; font-weight:700;">👤 불러오는 중...</div>
    <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-active" style="color:var(--green);">0</span><small>사용 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-waiting" style="color:var(--amber);">0</span><small>대기 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><small>전체</small></div>
    </div>
    <div class="card" style="border:2px solid var(--blue);">
        <div style="font-weight:700; margin-bottom:10px; font-size:14px;">🚀 로그인하기</div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="in-name" readonly style="width:90px; background:#f3f4f6;">
            <select id="in-account" onchange="updateBtn()"><option value="">계정 선택</option></select>
        </div>
        <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()">계정을 선택하세요</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-accounts">
    <div style="font-weight:700; margin-bottom:15px;">🎓 공유 계정 및 접속 정보</div>
    <div id="account-display-list"></div>
</div>

<div class="panel" id="panel-notice">
    <div style="font-weight:700; margin-bottom:10px;">📋 공지사항</div>
    <div id="notice-list"></div>
</div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('accounts',this)">🔑<span>계정</span></div>
  <div class="tab" onclick="goTab('notice',this)">📋<span>공지</span></div>
</div>

<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
/** 탭 기능 **/
function goTab(id, el){
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const target = document.getElementById('panel-' + id);
    if(target) target.classList.add('active');
    if(el) el.classList.add('active');
}

/** [설정] 디스코드 및 Firebase **/
const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1498503995528843426/MegqrgkoIBgr_xdYvEkB-PnWzh57_SZubFCKB_u0LbzNogBsC97t_8GMmTPR7eUgf5LX";

const firebaseConfig = {
    apiKey: "AIzaSyBy4_hmtnhYbbC7icOtajmpGvix4LO3Xhk",
    databaseURL: "https://muer-love-default-rtdb.firebaseio.com/",
    projectId: "muer-love"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const uRef=db.ref('login_users'), nRef=db.ref('notices'), aRef=db.ref('accounts');

let accounts={}, users={}, notices={}, myName=localStorage.getItem('my_name')||'', lastStatus=null, editTgt={type:null, id:null};

/** 디스코드 알림 발송 **/
function sendDiscordAlert(userName, accName) {
    fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            content: `🔔 **차례 알림**\n**${userName}**님, 기다리시던 [**${accName}**] 계정의 사용 차례가 되었습니다! 지금 접속해 주세요.`
        })
    });
}

/** 실시간 데이터 감시 **/
function listen(){
  aRef.on('value', s=>{
    accounts = s.val() || {};
    const opts = '<option value="">계정 선택</option>' + Object.entries(accounts).map(([id, a])=>`<option value="${id}">${a.label}</option>`).join('');
    document.getElementById('in-account').innerHTML = opts;
    renderAccountBoard(); renderAdminAcc(); updateBtn();
  });
  
  uRef.on('value', s=>{
    users = s.val() || {};
    const myInfo = Object.values(users).find(u => u.name === myName);
    if (myInfo && lastStatus === 'waiting' && myInfo.status === 'active') {
        document.getElementById('turn-popup-msg').innerText = `[${accounts[myInfo.accId]?.label || '선택 계정'}] 로그인 차례가 되었습니다!`;
        document.getElementById('turn-popup-overlay').style.display = 'flex';
    }
    lastStatus = myInfo ? myInfo.status : null;
    renderUsers(); updateBtn(); checkAndPromote();
  });

  nRef.on('value', s=>{ notices = s.val()||{}; renderNotices(); renderAdminNtc(); });
}

function checkAndPromote() {
    Object.entries(accounts).forEach(([accId, acc]) => {
        const activeCount = Object.values(users).filter(u => u.accId === accId && u.status === 'active').length;
        if (activeCount < (parseInt(acc.cap) || 1)) {
            const next = Object.entries(users).filter(([id, u]) => u.accId === accId && u.status === 'waiting').sort((a, b) => a[1].ts - b[1].ts)[0];
            if (next) {
                uRef.child(next[0]).update({ status: 'active', ts: Date.now() });
                sendDiscordAlert(next[1].name, acc.label); // 디스코드 전송
            }
        }
    });
}

/** 렌더링 **/
function renderUsers(){
    const arr = Object.entries(users).sort((a,b)=>a[1].ts - b[1].ts);
    document.getElementById('stat-active').textContent = arr.filter(u=>u[1].status==='active').length;
    document.getElementById('stat-waiting').textContent = arr.filter(u=>u[1].status==='waiting').length;
    document.getElementById('stat-total').textContent = arr.length;
    document.getElementById('user-list').innerHTML = arr.map(([id,u])=>`
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px;">
            <span><b>${u.name}</b> <small>(${accounts[u.accId]?.label || '...'})</small></span>
            <div style="display:flex; align-items:center;">
                <span style="font-size:11px; color:${u.status==='active'?'var(--green)':'var(--amber)'}; font-weight:700; margin-right:10px;">${u.status==='active'?'● 사용 중':'⏱ 대기 중'}</span>
                ${(u.name === myName) ? `<button onclick="uRef.child('${id}').remove()" style="border:none; background:var(--red); color:#fff; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">로그아웃</button>` : ""}
            </div>
        </div>`).join('');
}

function renderAccountBoard(){
    document.getElementById('account-display-list').innerHTML = Object.entries(accounts).map(([id, a])=>`
        <div class="card">
            <div style="display:flex; justify-content:space-between;"><b>${a.label}</b> <small>정원: ${a.cap || 1}명</small></div>
            <div class="acc-info-box"><b>🔑 접속 정보</b><br>ID: ${a.id} / PW: ${a.pw}<br><small>👤 주인: ${a.owner || '미지정'}</small></div>
        </div>`).join('') || '<div class="card">등록된 계정 없음</div>';
}

/** 제어 로직 **/
function updateBtn(){
    const btn=document.getElementById('btn-submit'), accId=document.getElementById('in-account').value;
    if(!myName || !accId) { btn.disabled=true; btn.className="btn btn-gray"; btn.textContent="계정을 선택하세요"; return; }
    const activeCount = Object.values(users).filter(u => u.accId === accId && u.status === 'active').length;
    btn.disabled = false;
    if(activeCount < (parseInt(accounts[accId]?.cap) || 1)) { btn.className = "btn btn-green"; btn.textContent = "🟢 지금 로그인하기"; }
    else { btn.className = "btn btn-amber"; btn.textContent = "🟡 사용 대기하기"; }
}
function handleReg(){
    if(Object.values(users).some(u=>u.name===myName)) return alert("이미 등록됨");
    const accId = document.getElementById('in-account').value;
    const status = Object.values(users).filter(u => u.accId === accId && u.status === 'active').length < (parseInt(accounts[accId]?.cap) || 1) ? 'active' : 'waiting';
    uRef.push({name:myName, accId:accId, status:status, ts:Date.now()});
}
function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; renderAdminNtc(); renderAdminAcc(); }
function closeAdmin() { document.getElementById('admin-overlay').style.display='none'; resetForm(); }
function showSub(id, btn){ document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none'); document.querySelectorAll('.btn-sub').forEach(b=>b.style.background='#f3f4f6'); document.getElementById('sub-'+id).style.display='block'; btn.style.background='var(--blue)'; btn.style.color='#fff'; }
function addNotice(){ const t=document.getElementById('ntc-title').value; if(t) nRef.push({title:t, body:document.getElementById('ntc-body').value, ts:Date.now()}).then(()=>resetForm()); }
function addAccount(){ const l=document.getElementById('acc-label').value; if(l) aRef.push({label:l, owner:document.getElementById('acc-owner').value, id:document.getElementById('acc-id').value, pw:document.getElementById('acc-pw').value, cap:document.getElementById('acc-cap').value}).then(()=>resetForm()); }
function renderAdminNtc(){ document.getElementById('ntc-mng-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div class="admin-item-row">${n.title} <span onclick="nRef.child('${id}').remove()" style="color:red; cursor:pointer;">삭제</span></div>`).join(''); }
function renderAdminAcc(){ document.getElementById('acc-mng-list').innerHTML=Object.entries(accounts).map(([id,a])=>`<div class="admin-item-row">${a.label} <span onclick="aRef.child('${id}').remove()" style="color:red; cursor:pointer;">삭제</span></div>`).join(''); }
function renderNotices(){ document.getElementById('notice-list').innerHTML=Object.entries(notices).sort((a,b)=>b[1].ts-a[1].ts).map(([id,n])=>`<div class="card" onclick="alert('${n.body.replace(/\n/g, '\\n')}')"><b>${n.title}</b></div>`).join(''); }
function resetForm(){ ['ntc-title','ntc-body','acc-label','acc-owner','acc-id','acc-pw','acc-cap'].forEach(i=>{if(document.getElementById(i)) document.getElementById(i).value='';}); }
function checkInitialName(){ if(!myName) document.getElementById('name-setup-overlay').style.display='flex'; else { document.getElementById('display-name').textContent = `👤 ${myName} 님`; document.getElementById('in-name').value = myName; listen(); } }
function saveInitialName(){ const v = document.getElementById('initial-name-input').value.trim(); if(!v) return alert("이름을 입력하세요!"); myName = v; localStorage.setItem('my_name', v); location.reload(); }
function forceReset(){ if(confirm("이용자를 변경하시겠습니까?")){ localStorage.removeItem('my_name'); location.reload(); } }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }

checkInitialName();
</script>
</body>
</html>
