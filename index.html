<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Muer 수강 및 진도 관리 시스템</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

/* 헤더 및 탭 */
.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:100;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}
.panel{display:none; padding:1rem;}
.panel.active{display:block;}

/* 오버레이 및 팝업 */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-gray{background:var(--gray); color:#fff;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit; font-size:14px;}
.progress-view{background:#f8fafc; border-radius:10px; padding:15px; min-height:100px; margin-bottom:15px; font-size:14px; white-space:pre-wrap; border:1px dashed #cbd5e1; line-height:1.6;}

/* 애니메이션 */
@keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02); background:#EFF6FF;} 100% {transform: scale(1);} }
.notify-active { animation: pulse 1.5s infinite; border: 2px solid var(--blue) !important; }
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <p style="font-size:13px; color:var(--gray); margin-bottom:20px;">시스템 이용을 위해 이름을 입력해 주세요.</p>
    <input type="text" id="initial-name-input" placeholder="이름 입력 (최대 8자)" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">확인</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="popup">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <h2 style="font-size:18px; margin-bottom:15px;">⚙️ 관리자 도구</h2>
    <div id="admin-auth">
      <input type="password" id="admin-pw" placeholder="비밀번호"><button onclick="unlockAdmin()" class="btn btn-blue">인증</button>
      <p style="font-size:11px; color:gray; margin-top:10px;">기본 비번은 admin1234 입니다.</p>
    </div>
    <div id="admin-tools" style="display:none;">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button onclick="showSub('ntc',this)" class="btn-sub active" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer;">공지</button>
            <button onclick="showSub('lec',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer;">강의</button>
            <button onclick="showSub('acc',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer;">계정</button>
        </div>
        <div id="sub-ntc" class="tool-box"><input type="text" id="ntc-title" placeholder="제목"><textarea id="ntc-body" rows="3" placeholder="내용"></textarea><button onclick="addNotice()" class="btn btn-blue">저장</button><div id="ntc-mng" style="margin-top:10px; font-size:12px;"></div></div>
        <div id="sub-lec" class="tool-box" style="display:none;"><input type="text" id="lec-name" placeholder="강의명"><input type="number" id="lec-cap" placeholder="정원" value="1"><select id="lec-acc-select"></select><button onclick="addLecture()" class="btn btn-green">저장</button><div id="lec-mng" style="margin-top:10px; font-size:12px;"></div></div>
        <div id="sub-acc" class="tool-box" style="display:none;"><input type="text" id="acc-label" placeholder="사이트명"><input type="text" id="acc-id" placeholder="ID"><input type="text" id="acc-pw" placeholder="PW"><input type="text" id="acc-owner" placeholder="주인"><button onclick="addAccount()" class="btn btn-gray" style="opacity:1;">저장</button><div id="acc-mng" style="margin-top:10px; font-size:12px;"></div></div>
    </div>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:10px; padding:6px 8px; border:1px solid #ddd; border-radius:8px; background:#fff;">⚙️</button>
  </div>
</div>

<div class="panel active" id="panel-status">
  <div class="card" style="display:flex; justify-content:space-between; align-items:center; background:#eff6ff; border:none;">
    <span id="display-name" style="font-weight:700;"></span>
    <button onclick="changeName()" style="font-size:10px; padding:4px 8px; border:1px solid #ddd; border-radius:5px;">변경</button>
  </div>
  <div class="card">
    <div style="display:flex; gap:8px;"><input type="text" id="in-name" readonly style="width:80px; margin-bottom:0;"><select id="in-lecture" style="margin-bottom:0;" onchange="updateBtn()"></select></div>
    <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()" style="margin-top:10px;">강의를 선택하세요</button>
  </div>
  <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
  <div style="font-weight:700; margin-bottom:15px;">📖 수강 진도 확인</div>
  <div class="card">
    <p style="font-size:12px; color:var(--gray); margin-bottom:8px;">이름을 직접 치거나 아래 목록에서 선택하세요.</p>
    <input type="text" id="progress-user-input" list="user-suggestions" placeholder="이름을 입력하세요" oninput="loadUserProgress()">
    <datalist id="user-suggestions"></datalist>
    <div class="progress-view" id="progress-display">진도를 불러오는 중입니다...</div>
  </div>

  <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);">
    <p style="font-weight:700; font-size:14px; margin-bottom:10px;">내 진도 업데이트</p>
    <textarea id="my-progress-input" rows="4" placeholder="오늘 공부한 내용을 기록하세요."></textarea>
    <button onclick="saveMyProgress()" class="btn btn-blue">진도 저장</button>
  </div>
</div>

<div class="panel" id="panel-lectures"><div id="lecture-display-list"></div></div>
<div class="panel" id="panel-accounts"><div id="account-board-list"></div></div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('accounts',this)">🔑<span>계정</span></div>
</div>
<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
let db=null, uRef=null, lRef=null, pRef=null, pwRef=null;
let lectures=[], users={}, progressData={}, myName=localStorage.getItem('my_name')||'';
let editTgt = { type: null, id: null };

function goTab(id, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

// ── 이름 설정 로직 ──
function checkInitialName() {
  if (!myName) {
    document.getElementById('name-setup-overlay').style.display = 'flex';
  } else {
    document.getElementById('name-setup-overlay').style.display = 'none';
    updateNameUI();
    // [중요] 처음 이름이 있으면 진도 메뉴에도 자동으로 넣어줌
    document.getElementById('progress-user-input').value = myName;
  }
}
function saveInitialName() {
  const v = document.getElementById('initial-name-input').value.trim();
  if(!v) return alert("이름을 입력하세요!");
  myName = v; localStorage.setItem('my_name', v);
  checkInitialName();
}
function changeName() { if(confirm("이름을 변경하시겠습니까?")) { localStorage.removeItem('my_name'); myName=''; checkInitialName(); } }

// ── Firebase 연동 ──
const u=localStorage.getItem('fb_url'), k=localStorage.getItem('fb_key'), pr=localStorage.getItem('fb_project');
if(u) {
  const app = firebase.initializeApp({apiKey:k, databaseURL:u, projectId:pr});
  db = firebase.database(app);
  uRef=db.ref('lecture_users'); lRef=db.ref('lectures'); pRef=db.ref('progress'); pwRef=db.ref('admin_pw');
  listen();
}

function listen(){
  lRef.on('value', s=>{
    lectures = Object.values(s.val()||[]);
    document.getElementById('in-lecture').innerHTML = '<option value="">강의 선택</option>' + lectures.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    renderLectures(); renderAdminLec();
  });
  uRef.on('value', s=>{ users = s.val()||{}; renderUsers(); updateBtn(); });
  pRef.on('value', s=>{
    progressData = s.val()||{};
    updateUserSuggestions();
    loadUserProgress();
  });
}

// ── [개선] 진도 메뉴 로직 ──
function updateUserSuggestions() {
  const dl = document.getElementById('user-suggestions');
  const names = Object.keys(progressData);
  if(myName && !names.includes(myName)) names.push(myName);
  dl.innerHTML = names.map(n => `<option value="${n}">`).join('');
}

function loadUserProgress() {
  const input = document.getElementById('progress-user-input');
  const target = input.value.trim();
  const display = document.getElementById('progress-display');
  const mySect = document.getElementById('my-progress-section');
  
  if(!target) { display.textContent = "조회할 이름을 입력하세요."; mySect.style.display = 'none'; return; }
  
  display.textContent = progressData[target] || "기록된 진도가 없습니다.";
  
  // 내 진도인 경우에만 수정창 노출
  if(target === myName) {
    mySect.style.display = 'block';
    if(!document.getElementById('my-progress-input').matches(':focus')) {
        document.getElementById('my-progress-input').value = progressData[myName] || "";
    }
  } else {
    mySect.style.display = 'none';
  }
}

function saveMyProgress() {
  const text = document.getElementById('my-progress-input').value.trim();
  if(!myName) return;
  pRef.child(myName).set(text);
  toast("진도가 업데이트되었습니다.");
}

// ── 관리자 도구 제어 ──
function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; }
function closeAdmin() { 
  document.getElementById('admin-overlay').style.display='none'; 
  document.getElementById('admin-auth').style.display='block';
  document.getElementById('admin-tools').style.display='none';
  document.getElementById('admin-pw').value='';
}
// [수정] 관리자 인증 로직 보강
function unlockAdmin() { 
  pwRef.once('value', s => { 
    const inputPw = document.getElementById('admin-pw').value;
    const serverPw = s.val() || 'admin1234';
    if(inputPw === serverPw){ 
      document.getElementById('admin-tools').style.display='block'; 
      document.getElementById('admin-auth').style.display='none'; 
    } else {
      alert("비밀번호가 틀렸습니다.");
    }
  }); 
}

function showSub(id, btn){
  document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none');
  document.querySelectorAll('.btn-sub').forEach(b=>b.classList.remove('active'));
  document.getElementById('sub-'+id).style.display='block';
  btn.classList.add('active');
  editTgt = { type: null, id: null };
}

// ── 기타 기능 (공지/강의/계정 관리) ──
function addNotice(){ const t=document.getElementById('ntc-title').value, b=document.getElementById('ntc-body').value; if(t) nRef.push({title:t,body:b,ts:Date.now()}); toast("저장됨"); }
function addLecture(){ const n=document.getElementById('lec-name').value, c=document.getElementById('lec-cap').value, a=document.getElementById('lec-acc-select').value; if(n) lRef.push({name:n,cap:c,accId:a}); toast("저장됨"); }
function addAccount(){ const l=document.getElementById('acc-label').value, i=document.getElementById('acc-id').value, p=document.getElementById('acc-pw').value; if(l) aRef.push({label:l,id:i,pw:p,ts:Date.now()}); toast("저장됨"); }

function updateNameUI(){ document.getElementById('display-name').textContent=`👤 ${myName} 님`; document.getElementById('in-name').value=myName; }
function handleReg(){ uRef.push({name:myName, lecture:document.getElementById('in-lecture').value, status:'active', ts:Date.now()}); toast("신청 완료"); }
function renderUsers(){ document.getElementById('user-list').innerHTML = Object.entries(users).map(([id,u])=>`<div class="card"><b>${u.name}</b> <small>(${u.lecture})</small><button onclick="uRef.child('${id}').remove()" style="float:right; border:none; padding:4px 8px; border-radius:5px; cursor:pointer;">종료</button></div>`).join(''); }
function updateBtn(){ const btn=document.getElementById('btn-submit'), lec=document.getElementById('in-lecture').value; btn.disabled=!myName||!lec; btn.className=btn.disabled?"btn btn-gray":"btn btn-blue"; if(!btn.disabled) btn.textContent="🟢 신청하기"; }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }
function forceReset(){ localStorage.clear(); location.reload(); }

function renderLectures(){ /* 강의 목록 표시 로직 */ }
function renderAdminLec(){ /* 관리자 강의 리스트 로직 */ }

checkInitialName();
</script>
</body>
</html>
