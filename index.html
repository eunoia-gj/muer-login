<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Muer 수강 및 진도 관리 시스템</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; --red:#EF4444; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

/* 헤더 및 탭바 */
.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:200;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}

.panel{display:none; padding:1rem;}
.panel.active{display:block !important;}

/* 팝업 오버레이 */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto;}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s; font-size:14px;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-amber{background:var(--amber); color:#fff;}
.btn-gray{background:var(--gray); color:#fff;}

.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;}
.stat{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
.stat-num{font-size:18px; font-weight:700; display:block;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit;}
.acc-info-box { background:#f0f7ff; border-radius:8px; padding:10px; margin-top:10px; font-size:13px; border:1px solid #dbeafe; line-height:1.6; }

/* 관리자 리스트 수정/삭제 버튼 스타일 */
.admin-item-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee; font-size:13px;}
.edit-link { color: var(--blue); cursor: pointer; margin-right: 10px; font-weight: 700; }
.del-link { color: var(--red); cursor: pointer; font-weight: 700; }
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <input type="text" id="initial-name-input" placeholder="이름을 입력해 주세요" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">시작하기</button>
  </div>
</div>

<div class="overlay" id="turn-popup-overlay">
  <div class="popup" style="text-align:center; border:4px solid var(--amber);">
    <h2 style="color:var(--amber); margin-bottom:10px;">🔔 지금 수강하세요!</h2>
    <p id="turn-popup-msg" style="margin-bottom:20px; line-height:1.6;"></p>
    <button onclick="document.getElementById('turn-popup-overlay').style.display='none'" class="btn btn-amber">확인했습니다</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="popup">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <h2 style="font-size:18px; margin-bottom:15px;">⚙️ 관리 시스템</h2>
    
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="showSub('ntc',this)" class="btn-sub active" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:var(--blue); color:white;">공지</button>
        <button onclick="showSub('lec',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">강의</button>
        <button onclick="showSub('acc',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">계정</button>
    </div>

    <div id="sub-ntc" class="tool-box">
        <input type="text" id="ntc-title" placeholder="제목">
        <textarea id="ntc-body" rows="3" placeholder="내용"></textarea>
        <button onclick="addNotice()" id="btn-ntc-save" class="btn btn-blue">저장</button>
        <div id="ntc-mng-list" style="margin-top:15px;"></div>
    </div>
    <div id="sub-lec" class="tool-box" style="display:none;">
        <input type="text" id="lec-name" placeholder="강의명">
        <input type="number" id="lec-cap" placeholder="정원 (숫자)">
        <select id="lec-acc-select"></select>
        <button onclick="addLecture()" id="btn-lec-save" class="btn btn-green">저장</button>
        <div id="lec-mng-list" style="margin-top:15px;"></div>
    </div>
    <div id="sub-acc" class="tool-box" style="display:none;">
        <input type="text" id="acc-label" placeholder="사이트명 (예: 넷플릭스)">
        <input type="text" id="acc-owner" placeholder="계정 주인 이름">
        <input type="text" id="acc-id" placeholder="ID">
        <input type="text" id="acc-pw" placeholder="PW">
        <button onclick="addAccount()" id="btn-acc-save" class="btn btn-gray">저장</button>
        <div id="acc-mng-list" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:11px; padding:6px 12px; border:1px solid #ddd; border-radius:8px; background:#fff;">👤 이용자 변경</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" id="display-name" style="background:#eff6ff; border:none; margin-bottom:15px; font-weight:700;">👤 불러오는 중...</div>
    <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-active" style="color:var(--green);">0</span><small>수강 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-waiting" style="color:var(--amber);">0</span><small>대기 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><small>전체</small></div>
    </div>
    <div class="card" style="border:2px solid var(--blue);">
        <div style="display:flex; gap:8px;">
            <input type="text" id="in-name" readonly style="width:90px; background:#f3f4f6;">
            <select id="in-lecture" onchange="updateBtn()"></select>
        </div>
        <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()">강의를 선택하세요</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
    <div class="card"><input type="text" id="progress-user-input" placeholder="조회할 이름 입력" oninput="loadUserProgress()"><div id="progress-display" style="background:#f8fafc; padding:15px; border-radius:10px; min-height:100px; font-size:14px; margin-top:10px; border:1px dashed #ddd;"></div></div>
    <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);"><p style="font-weight:700; font-size:13px; margin-bottom:10px;">📖 내 진도 업데이트</p><select id="progress-lecture-select" style="margin-bottom:8px;"></select><div style="display:flex; gap:8px; align-items:center;"><input type="number" id="progress-chapter-input" placeholder="수강 챕터" style="flex:1; margin-bottom:0;"><b>챕터</b></div><button onclick="saveMyProgress()" class="btn btn-blue" style="margin-top:10px;">저장하기</button></div>
</div>
<div class="panel" id="panel-lectures"><div id="lecture-display-list"></div></div>
<div class="panel" id="panel-notice-acc"><div id="notice-list" style="margin-bottom:30px;"></div><div id="account-board-list"></div></div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('notice-acc',this)">📋<span>공지/계정</span></div>
</div>

<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
/** 탭 기능 **/
function goTab(id, el){
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    if(el) el.classList.add('active');
}

/** Firebase 설정 **/
const firebaseConfig = {
    apiKey: "AIzaSyBy4_hmtnhYbbC7icOtajmpGvix4LO3Xhk",
    databaseURL: "https://muer-love-default-rtdb.firebaseio.com/",
    projectId: "muer-love"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const uRef=db.ref('lecture_users'), lRef=db.ref('lectures'), nRef=db.ref('notices'), aRef=db.ref('accounts'), pRef=db.ref('progress');

let lectures=[], users={}, progressData={}, notices={}, accounts={}, myName=localStorage.getItem('my_name')||'', lastStatus=null;
let editTgt = { type: null, id: null }; // [핵심] 현재 수정 중인 항목 정보를 담는 변수

/** 실시간 데이터 감시 **/
function listen(){
  lRef.on('value', s=>{
    lectures = s.val()||[]; // 강의는 배열로 처리 (인덱스 수정을 위해)
    const options = '<option value="">강의 선택</option>' + Object.values(lectures).map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    document.getElementById('in-lecture').innerHTML = options;
    document.getElementById('progress-lecture-select').innerHTML = options;
    renderLectures(); renderAdminLec(); updateBtn();
  });
  uRef.on('value', s=>{
    const newUsers = s.val()||{};
    const myInfo = Object.values(newUsers).find(u => u.name === myName);
    if (myInfo && lastStatus === 'waiting' && myInfo.status === 'active') {
        document.getElementById('turn-popup-msg').innerText = `기다려주셔서 감사합니다. [${myInfo.lecture}] 수강이 시작되었습니다!`;
        document.getElementById('turn-popup-overlay').style.display = 'flex';
    }
    lastStatus = myInfo ? myInfo.status : null;
    users = newUsers; renderUsers(); updateBtn(); checkAndPromote();
  });
  nRef.on('value', s=>{ notices = s.val()||{}; renderNotices(); renderAdminNtc(); });
  aRef.on('value', s=>{ accounts = s.val()||{}; renderAccBoard(); renderAdminAcc(); renderLectures();
    document.getElementById('lec-acc-select').innerHTML = '<option value="">계정 선택</option>' + Object.entries(accounts).map(([id, a])=>`<option value="${id}">${a.label}</option>`).join('');
  });
  pRef.on('value', s=>{ progressData = s.val()||{}; loadUserProgress(); });
}

function checkAndPromote() {
    Object.values(lectures).forEach(lec => {
        const activeCount = Object.values(users).filter(u => u.lecture === lec.name && u.status === 'active').length;
        if (activeCount < (parseInt(lec.cap) || 1)) {
            const next = Object.entries(users).filter(([id, u]) => u.lecture === lec.name && u.status === 'waiting').sort((a, b) => a[1].ts - b[1].ts)[0];
            if (next) uRef.child(next[0]).update({ status: 'active', ts: Date.now() });
        }
    });
}

/** 렌더링 **/
function renderUsers(){
    const arr = Object.entries(users).sort((a,b)=>a[1].ts - b[1].ts);
    document.getElementById('stat-active').textContent = arr.filter(u=>u[1].status==='active').length;
    document.getElementById('stat-waiting').textContent = arr.filter(u=>u[1].status==='waiting').length;
    document.getElementById('stat-total').textContent = arr.length;
    document.getElementById('user-list').innerHTML = arr.map(([id,u])=>`
        <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px;">
            <span><b>${u.name}</b> <small>(${u.lecture})</small></span>
            <div style="display:flex; align-items:center;">
                <span style="font-size:11px; color:${u.status==='active'?'var(--green)':'var(--amber)'}; font-weight:700; margin-right:10px;">${u.status==='active'?'● 수강 중':'⏱ 대기 중'}</span>
                ${(u.name === myName) ? `<button onclick="uRef.child('${id}').remove()" style="border:none; background:var(--red); color:#fff; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer;">종료</button>` : ""}
            </div>
        </div>`).join('');
}

function renderLectures(){
    document.getElementById('lecture-display-list').innerHTML = Object.values(lectures).map(l=>{
        let accHtml = '<div class="acc-info-box">연결된 계정 정보 없음</div>';
        if(l.accId && accounts[l.accId]) {
            const a = accounts[l.accId];
            accHtml = `<div class="acc-info-box"><b>🔑 연결 계정: ${a.label}</b><br>ID: ${a.id} / PW: ${a.pw}<br><small>주인: ${a.owner||'미지정'}</small></div>`;
        }
        return `<div class="card"><b>${l.name}</b> (정원 ${l.cap})${accHtml}</div>`;
    }).join('') || '<div class="card">등록된 강의 없음</div>';
}

/** 관리 시스템: 3가지 수정 기능 핵심 로직 **/

// 1. 공지 수정
function loadNtc(id) {
    editTgt = { type: 'ntc', id: id };
    document.getElementById('ntc-title').value = notices[id].title;
    document.getElementById('ntc-body').value = notices[id].body;
    document.getElementById('btn-ntc-save').innerText = "수정 완료";
    toast("공지 수정 모드");
}
function addNotice(){
    const t=document.getElementById('ntc-title').value, b=document.getElementById('ntc-body').value; if(!t) return;
    const ref = editTgt.type==='ntc' ? nRef.child(editTgt.id) : nRef.push();
    ref.set({title:t, body:b, ts:Date.now()}).then(()=>resetForm());
}

// 2. 강의 수정
function loadLec(idx) {
    editTgt = { type: 'lec', id: idx };
    const l = lectures[idx];
    document.getElementById('lec-name').value = l.name;
    document.getElementById('lec-cap').value = l.cap;
    document.getElementById('lec-acc-select').value = l.accId || "";
    document.getElementById('btn-lec-save').innerText = "수정 완료";
    toast("강의 수정 모드");
}
function addLecture(){
    const n=document.getElementById('lec-name').value, c=document.getElementById('lec-cap').value, a=document.getElementById('lec-acc-select').value; if(!n) return;
    const list = Array.isArray(lectures) ? [...lectures] : Object.values(lectures||{});
    if(editTgt.type==='lec') list[editTgt.id] = {name:n, cap:c, accId:a};
    else list.push({name:n, cap:c, accId:a});
    lRef.set(list).then(()=>resetForm());
}

// 3. 계정 수정
function loadAcc(id) {
    editTgt = { type: 'acc', id: id };
    const a = accounts[id];
    document.getElementById('acc-label').value = a.label;
    document.getElementById('acc-owner').value = a.owner;
    document.getElementById('acc-id').value = a.id;
    document.getElementById('acc-pw').value = a.pw;
    document.getElementById('btn-acc-save').innerText = "수정 완료";
    toast("계정 수정 모드");
}
function addAccount(){
    const l=document.getElementById('acc-label').value, o=document.getElementById('acc-owner').value, i=document.getElementById('acc-id').value, p=document.getElementById('acc-pw').value; if(!l) return;
    const ref = editTgt.type==='acc' ? aRef.child(editTgt.id) : aRef.push();
    ref.set({label:l, owner:o, id:i, pw:p, ts:Date.now()}).then(()=>resetForm());
}

// 관리자 리스트 렌더링 (수정/삭제 버튼 포함)
function renderAdminNtc(){ document.getElementById('ntc-mng-list').innerHTML=Object.entries(notices).map(([id,n])=>`<div class="admin-item-row"><span>${n.title}</span><div><span class="edit-link" onclick="loadNtc('${id}')">수정</span><span class="del-link" onclick="nRef.child('${id}').remove()">삭제</span></div></div>`).join(''); }
function renderAdminLec(){ document.getElementById('lec-mng-list').innerHTML=Object.values(lectures).map((l,i)=>`<div class="admin-item-row"><span>${l.name}</span><div><span class="edit-link" onclick="loadLec(${i})">수정</span><span class="del-link" onclick="const c=[...lectures]; c.splice(${i},1); lRef.set(c);">삭제</span></div></div>`).join(''); }
function renderAdminAcc(){ document.getElementById('acc-mng-list').innerHTML=Object.entries(accounts).map(([id,a])=>`<div class="admin-item-row"><span>${a.label}</span><div><span class="edit-link" onclick="loadAcc('${id}')">수정</span><span class="del-link" onclick="aRef.child('${id}').remove()">삭제</span></div></div>`).join(''); }

/** 기타 필수 기능 **/
function resetForm(){ 
    editTgt={type:null,id:null}; 
    ['ntc-title','ntc-body','lec-name','lec-cap','acc-label','acc-owner','acc-id','acc-pw'].forEach(i=>{if(document.getElementById(i)) document.getElementById(i).value='';}); 
    document.getElementById('btn-ntc-save').innerText="저장";
    document.getElementById('btn-lec-save').innerText="저장";
    document.getElementById('btn-acc-save').innerText="저장";
}
function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; renderAdminNtc(); renderAdminLec(); renderAdminAcc(); }
function closeAdmin() { document.getElementById('admin-overlay').style.display='none'; resetForm(); }
function showSub(id, btn){ document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none'); document.querySelectorAll('.btn-sub').forEach(b=>b.style.background='#f3f4f6'); document.getElementById('sub-'+id).style.display='block'; btn.style.background='var(--blue)'; btn.style.color='#fff'; resetForm(); }
function loadUserProgress() { const target = document.getElementById('progress-user-input').value.trim(); const display = document.getElementById('progress-display'); const mySect = document.getElementById('my-progress-section'); if(!target) { display.innerHTML="이름을 입력하세요."; mySect.style.display='none'; return; } const userData = progressData[target]; if(userData) { display.innerHTML = Object.entries(userData).map(([lec, d]) => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><b>[${lec}]</b> ${d.chapter}챕터 ${(target===myName)?`<button style="font-size:10px; border:none; padding:2px 5px;" onclick="pRef.child('${myName}').child('${lec}').remove()">삭제</button>`:''}</div>`).join(''); } else display.innerHTML = "기록 없음"; mySect.style.display = (target === myName) ? 'block' : 'none'; }
function saveMyProgress() { const c=document.getElementById('progress-chapter-input').value, l=document.getElementById('progress-lecture-select').value; if(l&&c) pRef.child(myName).child(l).set({chapter:c, ts:Date.now()}).then(()=>toast("저장됨")); }
function checkInitialName(){ if(!myName) document.getElementById('name-setup-overlay').style.display='flex'; else { document.getElementById('display-name').textContent = `👤 ${myName} 님`; document.getElementById('in-name').value = myName; document.getElementById('progress-user-input').value = myName; listen(); } }
function saveInitialName(){ const v = document.getElementById('initial-name-input').value.trim(); if(!v) return alert("이름을 입력하세요!"); myName = v; localStorage.setItem('my_name', v); location.reload(); }
function forceReset(){ if(confirm("이용자를 변경하시겠습니까?")){ localStorage.removeItem('my_name'); location.reload(); } }
function updateBtn(){ const btn=document.getElementById('btn-submit'), ln=document.getElementById('in-lecture').value; if(!myName||!ln){btn.disabled=true; return;} const lc=Object.values(lectures).find(l=>l.name===ln), ac=Object.values(users).filter(u=>u.lecture===ln&&u.status==='active').length; btn.disabled=false; btn.className=ac<(lc?lc.cap:1)?"btn btn-green":"btn btn-amber"; btn.textContent=ac<(lc?lc.cap:1)?"🟢 즉시 수강하기":"🟡 대기 등록하기"; }
function handleReg(){ if(Object.values(users).some(u=>u.name===myName)) return alert("이미 등록됨");
