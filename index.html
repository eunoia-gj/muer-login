<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muer 스마트 수강 및 진도 관리</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}

/* 레이아웃 */
.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:100;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}
.panel{display:none; padding:1rem;}
.panel.active{display:block;}

/* 팝업 */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}

.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-gray{background:var(--gray); color:#fff;}

input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit; font-size:14px;}
.admin-item-row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee; font-size:13px;}
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <input type="text" id="initial-name-input" placeholder="이름 입력 (최대 8자)" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">확인</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="popup">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <h2 style="font-size:18px; margin-bottom:15px;">⚙️ 관리자 도구</h2>
    
    <div id="admin-auth-box">
      <p style="font-size:12px; color:gray; margin-bottom:10px;">Firebase admin_pw에 설정한 비번을 입력하세요.</p>
      <input type="password" id="admin-pw-input" placeholder="비밀번호 입력">
      <button onclick="unlockAdmin()" class="btn btn-blue">인증하기</button>
    </div>

    <div id="admin-tools-box" style="display:none;">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button onclick="showSub('ntc',this)" class="btn-sub active" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:var(--blue); color:white;">공지</button>
            <button onclick="showSub('lec',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">강의</button>
            <button onclick="showSub('acc',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">계정</button>
        </div>
        <div id="sub-ntc" class="tool-box">
            <input type="text" id="ntc-title" placeholder="공지 제목"><textarea id="ntc-body" rows="3" placeholder="내용"></textarea>
            <button id="btn-ntc-save" onclick="addNotice()" class="btn btn-blue">저장</button>
            <div id="ntc-mng-list" style="margin-top:15px; max-height:180px; overflow-y:auto;"></div>
        </div>
        <div id="sub-lec" class="tool-box" style="display:none;">
            <input type="text" id="lec-name" placeholder="강의명"><input type="number" id="lec-cap" placeholder="정원">
            <select id="lec-acc-select"></select>
            <button id="btn-lec-save" onclick="addLecture()" class="btn btn-green">저장</button>
            <div id="lec-mng-list" style="margin-top:15px; max-height:180px; overflow-y:auto;"></div>
        </div>
        <div id="sub-acc" class="tool-box" style="display:none;">
            <input type="text" id="acc-label" placeholder="사이트명"><div style="display:flex; gap:5px;"><input type="text" id="acc-id" placeholder="ID"><input type="text" id="acc-pw" placeholder="PW"></div>
            <button id="btn-acc-save" onclick="addAccount()" class="btn btn-gray" style="opacity:1;">저장</button>
            <div id="acc-mng-list" style="margin-top:15px; max-height:180px; overflow-y:auto;"></div>
        </div>
    </div>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:10px; padding:6px 8px; border:1px solid #ddd; border-radius:8px; background:#fff;">⚙️</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; background:#eff6ff; border:none;">
        <span id="display-name" style="font-weight:700;"></span>
        <button onclick="changeName()" style="font-size:10px; padding:4px 8px; border:1px solid #ddd; border-radius:5px;">변경</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
    <div class="card">
        <input type="text" id="progress-user-input" list="user-suggestions" placeholder="이름 입력" oninput="loadUserProgress()">
        <datalist id="user-suggestions"></datalist>
        <div id="progress-display" style="background:#f8fafc; padding:15px; border-radius:10px; min-height:100px; font-size:14px; white-space:pre-wrap; margin-top:10px; border:1px dashed #ddd;">이름을 입력하면 진도가 나타납니다.</div>
    </div>
    <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);">
        <p style="font-weight:700; font-size:13px; margin-bottom:10px;">📖 내 진도 업데이트</p>
        <select id="progress-lecture-select" style="margin-bottom:8px;"></select>
        <textarea id="my-progress-input" rows="4" placeholder="진도를 기록하세요."></textarea>
        <button onclick="saveMyProgress()" class="btn btn-blue">저장하기</button>
    </div>
</div>

<div class="panel" id="panel-lectures">
    <div id="lecture-display-list"></div>
</div>

<div class="panel" id="panel-notice-acc">
    <div id="notice-list"></div>
    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
        <details>
            <summary style="font-weight:700; color:var(--blue); cursor:pointer; padding:12px; background:#fff; border-radius:12px; border:1px solid var(--border);">🔑 공유 계정 정보 보기</summary>
            <div id="account-board-list" style="margin-top:15px;"></div>
        </details>
    </div>
</div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('notice-acc',this)">📋<span>공지/계정</span></div>
</div>
<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
let db=null, uRef=null, lRef=null, nRef=null, aRef=null, pRef=null, pwRef=null;
let lectures=[], users={}, progressData={}, notices={}, accounts={}, myName=localStorage.getItem('my_name')||'';
let editTgt = { type: null, id: null };

function goTab(id, el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

// ── Firebase 초기화 ──
const u=localStorage.getItem('fb_url'), k=localStorage.getItem('fb_key'), pr=localStorage.getItem('fb_project');
if(u) {
  const app = firebase.initializeApp({apiKey:k, databaseURL:u, projectId:pr});
  db = firebase.database(app);
  uRef=db.ref('lecture_users'); lRef=db.ref('lectures'); nRef=db.ref('notices'); aRef=db.ref('accounts'); pRef=db.ref('progress'); pwRef=db.ref('admin_pw');
  listen();
}

function listen(){
  lRef.on('value', s=>{
    lectures = Object.values(s.val()||[]);
    const options = '<option value="">강의 선택</option>' + lectures.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    if(document.getElementById('progress-lecture-select')) document.getElementById('progress-lecture-select').innerHTML = options;
    renderLectures(); renderAdminLec();
  });
  uRef.on('value', s=>{ users = s.val()||{}; renderUsers(); });
  nRef.on('value', s=>{ notices = s.val()||{}; renderNotices(); renderAdminNtc(); });
  aRef.on('value', s=>{ 
    accounts = s.val()||{}; renderAccBoard(); renderAdminAcc();
    if(document.getElementById('lec-acc-select')) document.getElementById('lec-acc-select').innerHTML = '<option value="">계정 선택</option>' + Object.entries(accounts).map(([id, a])=>`<option value="${id}">${a.label}</option>`).join('');
  });
  pRef.on('value', s=>{ progressData = s.val()||{}; updateUserSuggestions(); loadUserProgress(); });
}

// ── [수정] 관리자 인증 로직 (강력 보안 및 디버깅) ──
function unlockAdmin() {
  const inputPw = document.getElementById('admin-pw-input').value.trim();
  if(!inputPw) return alert("비밀번호를 입력하세요.");

  pwRef.once('value', s => {
    const serverPw = s.val();
    if (serverPw === null) {
      alert("데이터베이스에 admin_pw가 설정되어 있지 않습니다.\nFirebase 콘솔에서 admin_pw를 생성해 주세요.");
      return;
    }
    
    if (String(inputPw) === String(serverPw)) {
      document.getElementById('admin-tools-box').style.display = 'block';
      document.getElementById('admin-auth-box').style.display = 'none';
      renderAdminNtc(); renderAdminLec(); renderAdminAcc();
      toast("인증 성공!");
    } else {
      alert("비밀번호가 일치하지 않습니다.");
    }
  }, err => {
    alert("권한 오류: Firebase 규칙에서 admin_pw 읽기 권한을 확인하세요.");
  });
}

function openAdmin() { document.getElementById('admin-overlay').style.display='flex'; }
function closeAdmin() { 
  document.getElementById('admin-overlay').style.display='none'; 
  document.getElementById('admin-auth-box').style.display='block';
  document.getElementById('admin-tools-box').style.display='none';
}

function showSub(id, btn){
  document.querySelectorAll('.tool-box').forEach(b=>b.style.display='none');
  document.querySelectorAll('.btn-sub').forEach(b=>{ b.style.background='#f3f4f6'; b.style.color='#111'; });
  document.getElementById('sub-'+id).style.display='block';
  btn.style.background='var(--blue)'; btn.style.color='#fff';
  resetForm();
}

function resetForm(){
  editTgt = { type: null, id: null };
  ['ntc-title','ntc-body','lec-name','lec-cap','acc-label','acc-id','acc-pw'].forEach(i=>{if(document.getElementById(i))document.getElementById(i).value='';});
  document.getElementById('btn-ntc-save').textContent="저장";
  document.getElementById('btn-lec-save').textContent="저장";
  document.getElementById('btn-acc-save').textContent="저장";
}

// ── 관리자 데이터 리스트 ──
function renderAdminNtc(){
  const el = document.getElementById('ntc-mng-list'); if(!el) return;
  el.innerHTML = Object.entries(notices).map(([id, n]) => `<div class="admin-item-row"><span>${n.title}</span><div><span onclick="loadNtc('${id}')" style="color:blue;cursor:pointer;margin-right:8px;">수정</span><span onclick="if(confirm('삭제?'))nRef.child('${id}').remove();" style="color:red;cursor:pointer;">삭제</span></div></div>`).join('');
}
function loadNtc(id){ editTgt={type:'ntc',id:id}; document.getElementById('ntc-title').value=notices[id].title; document.getElementById('ntc-body').value=notices[id].body; document.getElementById('btn-ntc-save').textContent="수정 완료"; }
function addNotice(){ const t=document.getElementById('ntc-title').value, b=document.getElementById('ntc-body').value; if(editTgt.type==='ntc') nRef.child(editTgt.id).update({title:t, body:b}); else nRef.push({title:t, body:b, ts:Date.now()}); resetForm(); }

function renderAdminLec(){
  const el = document.getElementById('lec-mng-list'); if(!el) return;
  el.innerHTML = lectures.map((l, i) => `<div class="admin-item-row"><span>${l.name}</span><div><span onclick="loadLec(${i})" style="color:blue;cursor:pointer;margin-right:8px;">수정</span><span onclick="if(confirm('삭제?')){lectures.splice(${i},1);lRef.set(lectures);}" style="color:red;cursor:pointer;">삭제</span></div></div>`).join('');
}
function loadLec(i){ editTgt={type:'lec',id:i}; const l=lectures[i]; document.getElementById('lec-name').value=l.name; document.getElementById('lec-cap').value=l.cap; document.getElementById('lec-acc-select').value=l.accId||''; document.getElementById('btn-lec-save').textContent="수정 완료"; }
function addLecture(){ const n=document.getElementById('lec-name').value, c=document.getElementById('lec-cap').value, a=document.getElementById('lec-acc-select').value; if(editTgt.type==='lec') lectures[editTgt.id]={name:n, cap:c, accId:a}; else lectures.push({name:n, cap:c, accId:a}); lRef.set(lectures); resetForm(); }

function renderAdminAcc(){
  const el = document.getElementById('acc-mng-list'); if(!el) return;
  el.innerHTML = Object.entries(accounts).map(([id, a]) => `<div class="admin-item-row"><span>${a.label}</span><div><span onclick="loadAcc('${id}')" style="color:blue;cursor:pointer;margin-right:8px;">수정</span><span onclick="if(confirm('삭제?'))aRef.child('${id}').remove();" style="color:red;cursor:pointer;">삭제</span></div></div>`).join('');
}
function loadAcc(id){ editTgt={type:'acc',id:id}; const a=accounts[id]; document.getElementById('acc-label').value=a.label; document.getElementById('acc-id').value=a.id; document.getElementById('acc-pw').value=a.pw; document.getElementById('btn-acc-save').textContent="수정 완료"; }
function addAccount(){ const l=document.getElementById('acc-label').value, i=document.getElementById('acc-id').value, p=document.getElementById('acc-pw').value; if(editTgt.type==='acc') aRef.child(editTgt.id).update({label:l,id:i,pw:p}); else aRef.push({label:l,id:i,pw:p,ts:Date.now()}); resetForm(); }

// ── 진도 관리 ──
function loadUserProgress() {
  const target = document.getElementById('progress-user-input').value.trim();
  const display = document.getElementById('progress-display');
  const mySect = document.getElementById('my-progress-section');
  if(!target) { display.textContent="이름을 입력하세요."; mySect.style.display='none'; return; }
  const data = progressData[target];
  if(data) {
    const text = typeof data === 'string' ? data : data.text;
    const lec = data.lecture ? `[${data.lecture}] ` : "";
    display.textContent = lec + (text || "기록 없음");
  } else { display.textContent = "기록된 진도가 없습니다."; }
  if(target === myName) {
    mySect.style.display='block';
    if(!document.getElementById('my-progress-input').matches(':focus')) {
      document.getElementById('my-progress-input').value = (data && data.text) ? data.text : (typeof data === 'string' ? data : "");
      document.getElementById('progress-lecture-select').value = (data && data.lecture) ? data.lecture : "";
    }
  } else { mySect.style.display='none'; }
}
function saveMyProgress() { 
    const t = document.getElementById('my-progress-input').value.trim(); 
    const l = document.getElementById('progress-lecture-select').value; 
    if(myName) { pRef.child(myName).set({ text: t, lecture: l }); toast("진도 저장 완료!"); }
}

// ── 공통 UI ──
function checkInitialName(){ if(!myName)document.getElementById('name-setup-overlay').style.display='flex'; else{document.getElementById('name-setup-overlay').style.display='none'; updateNameUI(); document.getElementById('progress-user-input').value=myName; loadUserProgress();}}
function saveInitialName(){ const v=document.getElementById('initial-name-input').value.trim(); if(!v)return alert("이름을 입력하세요!"); myName=v; localStorage.setItem('my_name',v); checkInitialName(); }
function updateNameUI(){ if(document.getElementById('display-name')) document.getElementById('display-name').textContent=`👤 ${myName} 님`; }
function renderUsers(){ document.getElementById('user-list').innerHTML=Object.entries(users).map(([id,u])=>`<div class="card"><b>${u.name}</b> <small>(${u.lecture})</small><button onclick="uRef.child('${id}').remove()" style="float:right; border:none; padding:4px 8px; border-radius:5px; cursor:pointer;">종료</button></div>`).join(''); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 2000); }
function forceReset(){ localStorage.clear(); location.reload(); }
function changeName(){ if(confirm("이름을 변경하시겠습니까?")){ localStorage.removeItem('my_name'); myName=''; checkInitialName(); } }
function updateUserSuggestions(){ const dl=document.getElementById('user-suggestions'); const names=Object.keys(progressData); if(myName&&!names.includes(myName))names.push(myName); dl.innerHTML=names.map(n=>`<option value="${n}">`).join(''); }
function renderNotices(){ document.getElementById('notice-list').innerHTML=Object.entries(notices).sort((a,b)=>b[1].ts-a[1].ts).map(([id,n])=>`<div class="card" style="cursor:pointer;" onclick="openNtc('${id}')"><b>${n.title}</b><div style="font-size:12px; color:#666; margin-top:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${n.body}</div></div>`).join(''); }
function openNtc(id){ alert(notices[id].body); } // 간단 알림으로 대체하거나 필요 시 팝업 복구
function renderAccBoard(){ document.getElementById('account-board-list').innerHTML=Object.values(accounts).map(a=>`<div class="card" style="border-left:4px solid var(--blue); background:#f9fafb;"><b>${a.label}</b><div style="margin-top:8px; font-size:13px;">ID: ${a.id} / PW: ${a.pw}</div></div>`).join(''); }
function renderLectures(){ document.getElementById('lecture-display-list').innerHTML=lectures.map(l=>{ let acc=(l.accId&&accounts[l.accId])?`<div style="font-size:11px; color:var(--blue); margin-top:5px;">🔑 계정: ${accounts[l.accId].label}</div>`:''; return `<div class="card"><b>${l.name}</b> (정원 ${l.cap})${acc}</div>`; }).join(''); }

checkInitialName();
</script>
</body>
</html>
