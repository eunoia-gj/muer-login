<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 스마트 수강 및 진도 관리</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --green:#22C55E; --amber:#F59E0B; --blue:#3B82F6; --gray:#6B7280; --bg:#F9FAFB; --border:#E5E7EB; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:#111; padding-bottom:80px;}
.header{background:#fff; padding:1rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100;}
.tabbar{position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff; border-top:1px solid var(--border); display:flex; z-index:100;}
.tab{flex:1; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; color:var(--gray); flex-direction:column;}
.tab.active{color:var(--blue); font-weight:700; border-top:2px solid var(--blue);}
.panel{display:none; padding:1rem;}
.panel.active{display:block;}
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;}
.popup{background:#fff; border-radius:20px; padding:25px; width:100%; max-width:420px; position:relative; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
.close-btn{position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray);}
.card{background:#fff; border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px;}
.btn{width:100%; border:none; font-weight:700; cursor:pointer; padding:12px; border-radius:10px; transition:0.2s;}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-amber{background:var(--amber); color:#fff;}
.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;}
.stat{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;}
.stat-num{font-size:18px; font-weight:700; display:block;}
input, select, textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); margin-bottom:8px; outline:none; font-family:inherit; font-size:14px;}
.acc-info-box { background:#f0f7ff; border-radius:8px; padding:10px; margin-top:10px; font-size:13px; border:1px solid #dbeafe; }
</style>
</head>
<body>

<div class="overlay" id="name-setup-overlay" style="display:none;">
  <div class="popup" style="text-align:center;">
    <h2 style="margin-bottom:15px; font-size:18px;">👋 반가워요!</h2>
    <input type="text" id="initial-name-input" placeholder="이름을 입력해 주세요" maxlength="8">
    <button onclick="saveInitialName()" class="btn btn-blue">시작하기</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="popup">
    <button class="close-btn" onclick="closeAdmin()">✕</button>
    <h2 style="font-size:18px; margin-bottom:15px;">⚙️ 관리 시스템</h2>
    <div style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="showSub('ntc',this)" class="btn-sub active" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:var(--blue); color:white;">공지</button>
        <button onclick="showSub('lec',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">강의</button>
        <button onclick="showSub('acc',this)" class="btn-sub" style="flex:1; font-size:11px; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#f3f4f6;">계정</button>
    </div>
    <div id="sub-ntc" class="tool-box"><input type="text" id="ntc-title" placeholder="제목"><textarea id="ntc-body" rows="3" placeholder="내용"></textarea><button onclick="addNotice()" class="btn btn-blue">저장</button><div id="ntc-mng-list" style="margin-top:10px;"></div></div>
    <div id="sub-lec" class="tool-box" style="display:none;"><input type="text" id="lec-name" placeholder="강의명"><input type="number" id="lec-cap" placeholder="정원"><select id="lec-acc-select"></select><button onclick="addLecture()" class="btn btn-green">저장</button><div id="lec-mng-list" style="margin-top:10px;"></div></div>
    <div id="sub-acc" class="tool-box" style="display:none;"><input type="text" id="acc-label" placeholder="사이트명"><input type="text" id="acc-owner" placeholder="주인"><div style="display:flex; gap:5px;"><input type="text" id="acc-id" placeholder="ID"><input type="text" id="acc-pw" placeholder="PW"></div><button onclick="addAccount()" class="btn btn-gray" style="opacity:1;">저장</button><div id="acc-mng-list" style="margin-top:10px;"></div></div>
  </div>
</div>

<div class="header">
  <b>📚 수강 현황판</b>
  <div style="display:flex; gap:8px;">
    <button onclick="openAdmin()" style="font-size:11px; padding:6px 12px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-weight:700;">관리</button>
    <button onclick="forceReset()" style="font-size:11px; padding:6px 12px; border:1px solid #ddd; border-radius:8px; background:#fff;">👤 이용자 변경</button>
  </div>
</div>

<div class="panel active" id="panel-status">
    <div class="card" id="display-name" style="background:#eff6ff; border:none; margin-bottom:15px; font-weight:700;">👤 불러오는 중...</div>
    <div class="stats">
        <div class="stat"><span class="stat-num" id="stat-active" style="color:var(--green);">0</span><small>수강 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-waiting" style="color:var(--amber);">0</span><small>대기 중</small></div>
        <div class="stat"><span class="stat-num" id="stat-total">0</span><small>전체</small></div>
    </div>
    <div class="card" style="border:2px solid var(--blue);">
        <div style="display:flex; gap:8px;">
            <input type="text" id="in-name" readonly style="width:90px; background:#f3f4f6;">
            <select id="in-lecture" onchange="updateBtn()"></select>
        </div>
        <button id="btn-submit" class="btn btn-gray" disabled onclick="handleReg()">강의를 선택하세요</button>
    </div>
    <div id="user-list"></div>
</div>

<div class="panel" id="panel-progress">
    <div class="card">
        <input type="text" id="progress-user-input" placeholder="이름 입력" oninput="loadUserProgress()">
        <div id="progress-display" style="background:#f8fafc; padding:15px; border-radius:10px; min-height:100px; font-size:14px; white-space:pre-wrap; margin-top:10px; border:1px dashed #ddd;">진도 없음</div>
    </div>
    <div id="my-progress-section" class="card" style="display:none; border-top:2px solid var(--blue);">
        <p style="font-weight:700; font-size:13px; margin-bottom:10px;">📖 내 진도 업데이트</p>
        <select id="progress-lecture-select" style="margin-bottom:8px;"></select>
        <input type="number" id="progress-chapter-input" placeholder="수강 중인 챕터 수">
        <button onclick="saveMyProgress()" class="btn btn-blue">진도 저장</button>
    </div>
</div>

<div class="panel" id="panel-lectures"><div id="lecture-display-list"></div></div>
<div class="panel" id="panel-notice-acc">
    <div id="notice-list" style="margin-bottom:30px;"></div>
    <div id="account-board-list"></div>
</div>

<div class="tabbar">
  <div class="tab active" onclick="goTab('status',this)">📊<span>현황</span></div>
  <div class="tab" onclick="goTab('progress',this)">📖<span>진도</span></div>
  <div class="tab" onclick="goTab('lectures',this)">🎓<span>강의</span></div>
  <div class="tab" onclick="goTab('notice-acc',this)">📋<span>공지/계정</span></div>
</div>
<div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; font-size:12px; opacity:0; transition:0.3s; z-index:2000;"></div>

<script>
// ⚠️ 여기에 본인의 Firebase 정보를 반드시 입력하세요!
const firebaseConfig = {
    apiKey: "발급받은_키_입력",
    databaseURL: "https://muer-love-default-rtdb.firebaseio.com/",
    projectId: "muer-love"
};

// 1. 이름부터 즉시 표시 (멈춤 방지)
let myName = localStorage.getItem('my_name') || '';
function updateNameUI() {
    if(myName) {
        document.getElementById('display-name').textContent = `👤 ${myName} 님`;
        document.getElementById('in-name').value = myName;
        document.getElementById('progress-user-input').value = myName;
    }
}
updateNameUI();

// 2. Firebase 연결 및 에러 체크
let db, uRef, lRef, nRef, aRef, pRef;
try {
    if(firebaseConfig.apiKey.includes("입력")) {
        alert("Firebase 설정 정보가 비어있습니다! 코드를 확인해 주세요.");
    } else {
        const app = firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        uRef=db.ref('lecture_users'); lRef=db.ref('lectures'); nRef=db.ref('notices'); aRef=db.ref('accounts'); pRef=db.ref('progress');
        listen();
    }
} catch(e) { alert("연결 실패: " + e.message); }

function listen(){
  lRef.on('value', s=>{
    const lectures = Object.values(s.val()||[]);
    const options = '<option value="">강의 선택</option>' + lectures.map(l=>`<option value="${l.name}">${l.name}</option>`).join('');
    document.getElementById('in-lecture').innerHTML = options;
    document.getElementById('progress-lecture-select').innerHTML = options;
    renderLectures(lectures); renderAdminLec(lectures); updateBtn(lectures);
  }, e => alert("읽기 권한 없음: Firebase 규칙을 확인하세요."));
  
  uRef.on('value', s=>{ renderUsers(s.val()||{}); });
  nRef.on('value', s=>{ renderNotices(s.val()||{}); renderAdminNtc(s.val()||{}); });
  aRef.on('value', s=>{ 
    const accounts = s.val()||{};
    renderAccBoard(accounts); renderAdminAcc(accounts);
    document.getElementById('lec-acc-select').innerHTML = '<option value="">계정 선택</option>' + Object.entries(accounts).map(([id, a])=>`<option value="${id}">${a.label}</option>`).join('');
  });
  pRef.on('value', s=>{ loadUserProgress(s.val()||{}); });
}

// ── 데이터 렌더링 함수들 ──
function renderUsers(data){
    const arr = Object.entries(data).sort((a,b)=>a[1].ts - b[1].ts);
    document.getElementById('stat-active').textContent = arr.filter(u=>u[1].status==='active').length;
    document.getElementById('stat-waiting').textContent = arr.filter(u=>u[1].status==='waiting').length;
    document.getElementById('stat-total').textContent = arr.length;
    document.getElementById('user-list').innerHTML = arr.map(([id,u])=>`
        <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
            <span><b>${u.name}</b> <small>(${u.lecture})</small></span>
            <div><span style="font-size:11px; color:${u.status==='active'?'var(--green)':'var(--amber)'}; font-weight:700; margin-right:10px;">${u.status==='active'?'● 수강 중':'⏱ 대기 중'}</span>
            <button onclick="uRef.child('${id}').remove()" style="border:none; background:#eee; padding:5px 10px; border-radius:5px; font-size:11px;">종료</button></div>
        </div>`).join('');
}

function renderLectures(list){
    document.getElementById('lecture-display-list').innerHTML = list.map(l=>{
        let accHtml = "";
        // 계정 정보 실시간 연동 로직
        aRef.once('value', snapshot => {
            const accs = snapshot.val() || {};
            if(l.accId && accs[l.accId]) {
                const a = accs[l.accId];
                const box = document.getElementById(`acc-box-${l.name.replace(/\s/g,'')}`);
                if(box) box.innerHTML = `<b>🔑 연결 계정: ${a.label}</b><br>ID: ${a.id} / PW: ${a.pw}<br><small>주인: ${a.owner||'미정'}</small>`;
            }
        });
        return `<div class="card"><b>${l.name}</b> (정원 ${l.cap})<div id="acc-box-${l.name.replace(/\s/g,'')}" class="acc-info-box">연결된 계정 없음</div></div>`;
    }).join('') || '<div class="card">강의가 없습니다.</div>';
}

function loadUserProgress(data){
    const target = document.getElementById('progress-user-input').value.trim();
    const display = document.getElementById('progress-display');
    const mySect = document.getElementById('my-progress-section');
    if(!target) { display.innerHTML="이름을 입력하세요."; mySect.style.display='none'; return; }
    const userData = data[target];
    if(userData) {
        display.innerHTML = Object.entries(userData).map(([lec, d]) => `<div><b>[${lec}]</b> ${d.chapter}챕터</div>`).join('');
    } else { display.innerHTML = "진도 없음"; }
    mySect.style.display = (target === myName) ? 'block' : 'none';
}

// ── 필수 초기 로직 ──
function checkInitialName(){ if(!myName) document.getElementById('name-setup-overlay').style.display='flex'; else updateNameUI(); }
function saveInitialName(){ const v=document.getElementById('initial-name-input').value.trim(); if(!v) return alert("이름을 입력하세요!"); myName=v; localStorage.setItem('my_name', v); checkInitialName(); location.reload(); }
function forceReset(){ if(confirm("이용
